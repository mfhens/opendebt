# OpenDebt pack — petition-driven coding workflow
#
# Agents:
#   city-scoped:  backlog-planner, petition-translator, petition-to-gherkin,
#                 specs-translator, code-reviewer, catala-encoder, doc-sync,
#                 tech-debt-executor
#   rig-scoped:   tdd-enforcer (backend services), portal-tdd-enforcer (portal rigs)
#
# Formulas: mol-petition-scaffold, mol-petition-implement, mol-tech-debt
#
# Usage:
#   In city.toml: includes = ["packs/opendebt"]
#   Per-rig:      [[rigs]] ... includes = ["packs/opendebt"]

[pack]
name = "opendebt"
schema = 1

[formulas]
dir = "formulas"

# ── City-scoped agents ───────────────────────────────────────────────────────

[[agent]]
name = "backlog-planner"
scope = "city"
description = "Patrols for new petitions and pours the scaffold formula"
prompt_template = "prompts/backlog-planner.md.tmpl"
nudge = "Check for petitions labelled 'ready' with no open molecule. Pour mol-petition-scaffold for each one."
idle_timeout = "30m"

[[agent]]
name = "petition-translator"
scope = "city"
description = "Translates raw petition markdown to a structured outcome contract"
prompt_template = "prompts/petition-translator.md.tmpl"
work_query = "bd ready --label=translate --assignee=opendebt/petition-translator"
nudge = "A petition awaits translation. Produce outcome-contract.md and close your bead."
max_active_sessions = 1
idle_timeout = "1h"

[[agent]]
name = "petition-to-gherkin"
scope = "city"
description = "Converts outcome contract to Gherkin feature file and failing step-def stubs"
prompt_template = "prompts/petition-to-gherkin.md.tmpl"
work_query = "bd ready --label=gherkin --assignee=opendebt/petition-to-gherkin"
nudge = "An outcome contract is ready. Generate a .feature file and failing Cucumber step definitions."
max_active_sessions = 1
idle_timeout = "1h"

[[agent]]
name = "specs-translator"
scope = "city"
description = "Converts requirements and architecture to implementation spec"
prompt_template = "prompts/specs-translator.md.tmpl"
work_query = "bd ready --label=specs --assignee=opendebt/specs-translator"
nudge = "Outcome contract is ready. Produce implementation-spec.md: service layer, entities, API contracts, GDPR notes."
max_active_sessions = 1
idle_timeout = "1h"

[[agent]]
name = "code-reviewer"
scope = "city"
description = "Reviews implementation against petition, specs, GDPR rules, and coding standards"
prompt_template = "prompts/code-reviewer.md.tmpl"
work_query = "bd ready --label=review --assignee=opendebt/code-reviewer"
nudge = "Code is ready for review. Validate against petition, specs, GDPR constraints, and opendebt coding standards."
max_active_sessions = 1
idle_timeout = "1h"

[[agent]]
name = "catala-encoder"
scope = "city"
description = "Encodes statutory rules in Catala formal specification (Tier A petitions only)"
prompt_template = "prompts/catala-encoder.md.tmpl"
work_query = "bd ready --label=catala --assignee=opendebt/catala-encoder"
nudge = "A Tier A petition rule is ready for Catala encoding. Produce .catala_da source + companion test scope."
max_active_sessions = 1
idle_timeout = "2h"

[[agent]]
name = "doc-sync"
scope = "city"
description = "Synchronises documentation after approved implementation"
prompt_template = "prompts/doc-sync.md.tmpl"
work_query = "bd ready --label=docsync --assignee=opendebt/doc-sync"
nudge = "Implementation approved. Update AGENTS.md, architecture/overview.md, and relevant ADRs."
max_active_sessions = 1
idle_timeout = "30m"

[[agent]]
name = "tech-debt-executor"
scope = "city"
description = "Implements TB-* items from program-status.yaml technical_backlog"
prompt_template = "prompts/tech-debt-executor.md.tmpl"
work_query = "bd ready --label=tech-debt --assignee=opendebt/tech-debt-executor"
nudge = "A TB item bead is ready. Read program-status.yaml, implement the item, run mvn verify, push."
max_active_sessions = 1
idle_timeout = "2h"

# ── Rig-scoped agents ────────────────────────────────────────────────────────
# tdd-enforcer is stamped per registered backend service rig.
# portal-tdd-enforcer is stamped per registered portal rig.

[[agent]]
name = "tdd-enforcer"
scope = "rig"
description = "Implements Java code under TDD discipline: red → green → refactor"
prompt_template = "prompts/tdd-enforcer.md.tmpl"
work_query = "bd ready --label=implement --assignee={{.QualifiedName}}"
nudge = "Check your hook. Implement the assigned spec. Run 'mvn test' — no failures allowed."
max_active_sessions = 2
min_active_sessions = 0
scale_check = "bd ready --label=implement --assignee={{.QualifiedName}} | wc -l"
idle_timeout = "2h"
rig_filter = ["rules-engine", "debt-service", "payment-service", "creditor-service", "case-service", "integration-gateway", "person-registry", "letter-service", "wage-garnishment-service"]

[[agent]]
name = "portal-tdd-enforcer"
scope = "rig"
description = "Implements portal UI code (Thymeleaf + HTMX) under TDD discipline"
prompt_template = "prompts/portal-tdd-enforcer.md.tmpl"
work_query = "bd ready --label=implement --assignee={{.QualifiedName}}"
nudge = "Check your hook. Implement the assigned portal feature. Run 'mvn test' — no failures allowed."
max_active_sessions = 2
min_active_sessions = 0
scale_check = "bd ready --label=implement --assignee={{.QualifiedName}} | wc -l"
idle_timeout = "2h"
rig_filter = ["creditor-portal", "caseworker-portal", "citizen-portal"]
