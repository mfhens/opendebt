            full acceptance. Blocks petition051 Phase 1 and Phase 2 go-live on HDP.
        - id: TB-028-b
          title: Validate immudb4j with Spring Boot 3.3 / Java 21
          status: done
          priority: high
          resolved: 2026-03-26
          notes: |
            immudb4j 1.0.1 integrates with Spring Boot 3.5 / Java 21.
            Netty 4.1.131 conflict (Spring Boot 3.5 vs gRPC 1.44.1) resolved by excluding
            grpc-netty and substituting grpc-netty-shaded:1.44.1 (bundles Netty internally).
            commit: be6d0d7
        - id: TB-028-c
          title: Implement ImmuLedgerClient and dual-write in BookkeepingService
          status: done
          priority: high
          resolved: 2026-03-26
          notes: |
            ImmuLedgerClient, RealImmudbAdapter, ImmudbConfig, LedgerImmuRecord, and
            DemoDataSeeder implemented and tested. 14 ledger pairs (28 entries) seeded
            on startup. ImmudbAdapter interface allows easy test mocking.
            commit: be6d0d7 (and preceding spike commits)
        - id: TB-028-d
          title: Measure dual-write latency under realistic load
          status: not_started
          priority: high
          notes: |
            Run a load test simulating concurrent ledger postings (payment-service
            under load). Measure p95/p99 latency impact of the async immudb append.
            Acceptable threshold: async path must not increase synchronous response
            time by more than 5ms at p95. Deferred to petition051 NFR-2.
        - id: TB-028-e
          title: Demonstrate tamper-evidence proof verification
          status: not_started
          priority: high
          notes: |
            Use immudb4j verifiedGet() or the immudb CLI to retrieve a ledger entry
            by transactionId and produce a cryptographic proof. Verify the proof
            independently (simulating an auditor with no application access).
            Document the verification procedure for Rigsrevisionen use.
            Covered by petition051 FR-6.3 (verifiedGet in audit endpoint).
        - id: TB-028-f
          title: Assess immudb backup and HA requirements (ADR-0028 alignment)
          status: not_started
          priority: medium
          notes: |
            Evaluate immudb replication options (immudb follower replication).
            Determine how immudb data is included in the pgBackRest / Velero DR
            strategy from ADR-0028. immudb tamper-evidence is only meaningful if
            the immudb state itself is preserved and recoverable.
      outcome: |
        CONDITIONALLY ACCEPTED: ADR-0029 moved to Accepted — Pending Platform Validation.
        Spike validated: immudb4j 1.0.1 works with Spring Boot 3.5 / Java 21; dual-write
        pattern operational; 28 demo ledger entries seeded and verified via REST API;
        Netty conflict resolved. TB-028-a (HDP platform validation) outstanding.
        Next step: petition051 for production hardening and audit UI.
        petition: petition051

    - id: TB-030
      title: "Eliminate OioClaimMapper / SkatClaimMapper private-method duplication"
      status: done
      priority: low
      created: 2026-03-26
      resolved: 2026-03-26
      petition: petition019
      description: |
        Code review of petition019 found that OioClaimMapper and SkatClaimMapper each
        carried identical copies of mapOutcome() and parseDate() private helpers (~14
        lines each). The concrete public methods must remain separate because OIO and
        SKAT generated JAXB types live in different packages (different XML namespaces).
        Resolved by extracting both helpers into a package-level utility class:
        opendebt-integration-gateway/.../gateway/soap/ClaimMapperUtils.java
        Both mappers now delegate to ClaimMapperUtils. 59/59 tests pass.
      commit: d4559ab

    - id: TB-031
      title: "Close ClsSoapAuditInterceptor PII exposure window"
      status: done
      priority: high
      created: 2026-03-26
      resolved: 2026-03-26
      petition: petition019
      description: |
        ClsSoapAuditInterceptor stored the raw SOAP request and response bodies
        (including PII such as CPR numbers, names, and account numbers) in
        MessageContext properties "rawRequestBody" / "rawResponseBody", and only
        applied SoapPiiMaskingUtil in afterCompletion(). This left unmasked PII
        in memory for the full duration of each request cycle, visible to thread
        dumps, heap dumps, or verbose logging.
        Fix: mask at point of capture. Raw bodies are local variables only (used
        for resolveServiceAndOperation() and fault extraction), then immediately
        masked. MessageContext stores "maskedRequestBody" / "maskedResponseBody"
        exclusively. afterCompletion() reads the pre-masked values directly.
        No change to CLS audit event content or test behaviour. 59/59 tests pass.
      commit: 62c94c6
    - id: TB-033
      title: "CPR lookup throttling per user per birth date in person-registry"
      status: open
      priority: medium
      created: 2026-04-28
      description: |
        FR 6 from petition 033 outcome contract: limit CPR lookups to prevent abuse.
        The person-registry service should enforce a rate limit on POST /persons/lookup
        keyed by (authenticated user subject + birth date) to prevent enumeration attacks.
        Suggested approach: Redis-backed sliding window counter (e.g. 10 lookups / 60 s),
        returning HTTP 429 with Retry-After on breach. Creditor-portal catches 429 and
        displays a user-friendly throttle message at the debtor step of the wizard.
        Consider configuring the limit via Spring Boot application properties so it can
        be tuned per environment without redeployment.

    - id: TB-032
      title: "Improve opendebt-common unit test coverage"
      status: open
      priority: medium
      created: 2026-03-26
      description: |
        opendebt-common has 56 source files but only 5 classes under test
        (AuthContext, EventCategoryMapper, TimelineDeduplicator, TimelineFragment,
        TimelineVisibilityProperties). Measured coverage is ~16% lines / 19% branches,
        far below the project target of 80% / 70%. A coverage override was added
        (jacoco.line.coverage=0.14, jacoco.branch.coverage=0.16) to unblock CI.
        Resolution: add tests for DTOs, access checkers (CaseAccessChecker,
        CreditorAccessChecker, DebtorAccessChecker), audit components
        (AuditContextFilter, AuditContextService, ClsAuditClientImpl,
        ClsAuditEventMapper), SoapPiiMaskingUtil, Oces3CertificateParser,
        GlobalExceptionHandler, and the timeline mapper. Remove the override once
        targets are met.

    - id: TB-034
      title: "Fix inter-claim dækningsrækkefølge in collection-priority.drl (GIL § 4)"
      status: open
      priority: high
      created: 2026-03-28
      petitions: [petition001, petition007]
      description: |
        G.A. audit found two defects in the inter-claim coverage priority:
        (1) collection-priority.drl has the wrong category order — current: boernebidrag #1,
        skat #2, bøder #3. Correct per GIL § 4 / G.A.2.3.2.1: bøder/tvangsbøder (cat 1) →
        underholdsbidrag (cat 2) → andre fordringer (cat 3), FIFO within each category.
        (2) OverpaymentRulesServiceImpl.resolveOutcome() always returns PAYOUT — the
        COVER_OTHER_DEBTS path is an AIDEV-TODO placeholder blocked on two missing model
        elements: a sagstype discriminator on DebtEntity and a frivillig-indbetaling boolean
        flag. Both model additions must precede the OverpaymentRules unblock.
        Within-claim priority (rente → gebyrer → hauptfordring) is correctly implemented in
        CoveragePriorityServiceImpl and must not be changed.

    - id: TB-035
      title: "Enforce 5-business-day rate-lag in InterestAccrualJob (GIL § 5 / G.A.2.1.1)"
      status: open
      priority: medium
      created: 2026-03-28
      petitions: [petition043, petition045]
      description: |
        InterestAccrualJob.execute() calls configService.preloadRatesForDate(accrualDate)
        which performs a straight date lookup. A new GIL § 5 inddrivelsesrente rate entered
        effective 1 January will be applied on 1 January itself rather than 5 business days
        later as required by G.A.2.1.1.
        Fix: introduce a BusinessDayCalculator utility (respecting Danish public holidays)
        and offset the rate lookup date by -5 business days before querying business_config.
        BusinessConfigService.preloadRatesForDate() is the single point of change; the
        effective_from dates stored in business_config remain the legislated change dates.

    - id: TB-036
      title: "INDR_CONTRACT IT-supportability gate in InterestAccrualJobHelper (G.A.2.1.2)"
      status: open
      priority: medium
      created: 2026-03-28
      petitions: [petition045]
      description: |
        InterestAccrualJobHelper.resolveRate() handles INDR_CONTRACT by checking only that
        additionalInterestRate != null — if set, it blindly applies whatever rate was stored.
        Per G.A.2.1.2 / gældsinddrivelsesbekendtgørelsens § 9 stk. 3, RIM may only apply a
        contractual/court-ordered alternative rate if it is IT-supported. If not, the
        fordringshaver must submit the interest themselves.
        Fix: maintain a permitted INDR_CONTRACT rate-type registry (e.g. in business_config
        or a new table); resolveRate() must reject unknown rate types rather than applying
        them. The Configuration Administration UI (petition 047) should expose the permitted
        list to fordringshavere. Also remove or disable interest-calculation.drl which
        contains a stale hardcoded 10% rate not wired to the batch job.

    - id: TB-037
      title: "Add submissionPath to FordringValidationRequest to gate MODR to DMI-path (P015 Rule 411)"
      status: open
      priority: low
      created: 2026-03-28
      petitions: [petition015]
      description: |
        fordring-validation.drl Rule 411 accepts ArtType MODR unconditionally for both
        OPRETFORDRING and GENINDSENDFORDRING. Per the petition's own PSRM Reference Context,
        MODR is a legacy DMI concept absent from PSRM. New PSRM-path submissions must use
        INDR only; MODR acceptance is for DMI-path backwards compatibility.
        Fix: add a submissionPath enum field (PSRM_PATH | DMI_PATH) to
        FordringValidationRequest. Update Rule 411 to only accept MODR when
        submissionPath == DMI_PATH. The integration-gateway must set the correct path based
        on the ingress channel. Cross-cutting change requiring coordination across
        rules-engine, integration-gateway, and creditor-service.

    - id: TB-038
      title: "Wire TimelineReplayServiceImpl from retroactive nedskrivning path (P034 / P039)"
      status: open
      priority: medium
      created: 2026-03-28
      petitions: [petition034, petition039]
      description: |
        RetroactiveCorrectionServiceImpl and TimelineReplayServiceImpl exist in
        opendebt-payment-service and are triggered by PaymentMatchingServiceImpl on crossing
        detection. However, the adjustment processing path (ClaimAdjustmentController →
        DebtServiceClient.submitAdjustment()) does not invoke replay when a nedskrivning's
        virkningsdato precedes today. Per G.A.1.4.4, retroactive nedskrivning requires
        reassignment of all dækninger after virkningsdato and interest recalculation.
        Fix: debt-service must publish a RetroactiveAdjustmentEvent on any nedskrivning with
        virkningsdato < today; payment-service must consume it and invoke
        TimelineReplayServiceImpl.replayTimeline() for the affected claim.
        Note: current replay handles single-event storno only — multi-event and cascading
        corrections (FR-4, FR-5, FR-7 from petition039) remain as follow-on work here.

    - id: TB-039
      title: "Implement rentegodtgørelse alternative for retroactive nedskrivning (GIL § 18l)"
      status: open
      priority: low
      created: 2026-03-28
      petitions: [petition039]
      description: |
        Per G.A.1.4.4 / GIL § 18 l, restanceinddrivelsesmyndighed may choose to set a
        nedskrivning's effective date to the date of receipt (prospective, not retroactive)
        and instead pay the debtor a rentegodtgørelse (interest compensation), avoiding the
        cost of full retroactive timeline replay.
        Currently no code path exists for this alternative — petition039 mandates full replay
        as the primary path (TB-038). The rentegodtgørelse path is an additional option, not
        a replacement; implementation should follow TB-038 completion.
        Requires: a caseworker decision step (caseworker-portal), a new RENTEGODTGOERELSE
        CollectionMeasure type, and an outbound payment to the debtor via NemKonto.
