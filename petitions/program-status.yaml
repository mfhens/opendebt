    - id: TB-010
      title: Add bookkeeping balance validation (debit == credit per transaction)
      status: not_started
      priority: medium
      created: 2026-03-15
      source: AIDEV-TODO in BookkeepingServiceImpl.java:24
      description: |
        Double-entry bookkeeping (ADR-0018) requires that debit sum equals credit sum
        per transactionId. Add a post-commit validation or database constraint to enforce
        this invariant.

    - id: TB-011
      title: Emit event to case-service for manual payment matching task
      status: not_started
      priority: medium
      created: 2026-03-15
      source: AIDEV-TODO in PaymentMatchingServiceImpl.java:91
      description: |
        When auto-matching fails and manual matching is needed, the payment-service
        should emit an event or call case-service to create a caseworker matching task.
        Currently logs a warning but takes no action.

    - id: TB-012
      title: Wrap payment matching in saga/outbox pattern
      status: not_started
      priority: high
      created: 2026-03-15
      source: AIDEV-TODO in PaymentMatchingServiceImpl.java:134
      description: |
        Bookkeeping recording and debt write-down are currently sequential REST calls.
        Both operations must be wrapped in a saga or transactional outbox pattern to
        guarantee atomicity. A failed write-down after successful bookkeeping leaves
        inconsistent state.

    - id: TB-013
      title: Add Resilience4j circuit breaker and retry to payment-service DebtServiceClient
      status: not_started
      priority: medium
      created: 2026-03-15
      source: AIDEV-TODO in payment-service DebtServiceClient.java:20
      description: |
        payment-service's DebtServiceClient calls debt-service REST API without any
        resilience patterns. Add Resilience4j @CircuitBreaker and @Retry on findByOcrLine
        and writeDown methods to handle transient failures gracefully.
