  # ===========================================================================
  # Technical Debt and Infrastructure Backlog
  # ===========================================================================
  # Items that are not petitions but need tracking for implementation quality.

  technical_backlog:
    - id: TB-001
      title: Migrate remaining entities to AuditableEntity base class
      status: in_progress
      priority: medium
      created: 2026-03-14
      description: |
        ADR-0022 established shared audit infrastructure in opendebt-common.
        CreditorEntity and ChannelBindingEntity are migrated. Remaining entities
        should extend AuditableEntity to reduce duplication and ensure consistent
        audit field handling.
      entities_migrated:
        - CreditorEntity (creditor-service)
        - ChannelBindingEntity (creditor-service)
      entities_pending:
        - DebtEntity (debt-service)
        - DebtTypeEntity (debt-service)
        - CaseEntity (case-service)
        - PaymentEntity (payment-service)
        - LedgerEntryEntity (payment-service)
        - DebtEventEntity (payment-service)
        - PersonEntity (person-registry)
        - OrganizationEntity (person-registry)
      notes: Can be done incrementally per service. Each migration requires updating entity imports, extending AuditableEntity, removing duplicate audit fields, and verifying tests pass.

    - id: TB-002
      title: Enable CLS integration for production
      status: not_started
      priority: high
      created: 2026-03-14
      description: |
        ClsAuditClient infrastructure is implemented but disabled by default.
        Production deployment requires configuring CLS endpoint, mTLS certificates,
        and enabling opendebt.audit.cls.enabled=true.
      depends_on:
        - UFST CLS endpoint availability
        - mTLS certificate provisioning
      notes: NoOpClsAuditClient is used in dev/test. ClsAuditClientImpl activates when enabled.

    - id: TB-003
      title: Fix SonarCloud SQL duplication false positives
      status: wont_fix
      priority: low
      created: 2026-03-14
      description: |
        SonarCloud flags ~3% duplication in SQL migrations (V1__create_*_tables.sql).
        This is expected and architecturally correct - each microservice database
        requires its own audit infrastructure (triggers, tables). Not fixable
        without violating ADR-0007 (no cross-service DB access).
      notes: Accept as technical debt. Document in ADR-0022.

    - id: TB-004
      title: Wire Smooks CREMUL/DEBMUL filter pipeline in integration-gateway
      status: blocked
      priority: high
      created: 2026-03-15
      source: AIDEV-TODO in SkbEdifactServiceImpl.java:76
      description: |
        SkbEdifactServiceImpl.parseCremul() returns an empty list. Smooks filter
        pipeline must be wired once real CREMUL sample files are received from SKB.
      blockers:
        - Waiting for real CREMUL sample files from SKB/Bankdata
      notes: Also includes AIDEV-TODO at line 86 — interchange sender/receiver IDs ("OPENDEBT", "SKB") are hardcoded and must come from configuration.

    - id: TB-005
      title: Add partial unique index on ocr_line for non-terminal debts
      status: not_started
      priority: medium
      created: 2026-03-15
      source: AIDEV-TODO in DebtEntity.java:69
      description: |
        ocr_line is used as the primary key for auto-matching incoming CREMUL payments.
        A partial unique index on ocr_line WHERE status NOT IN ('PAID','CANCELLED') is
        needed to prevent duplicate OCR lines for active debts. Requires a Flyway migration.

    - id: TB-006
      title: Load debt type codes from configuration table
      status: not_started
      priority: medium
