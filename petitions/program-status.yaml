schema_version: 1

program:
  name: OpenDebt petition implementation program
  updated_at: 2026-03-17
  updated_by: factory-droid (Phase 9 implemented — all 10 creditor portal feature pages done, 242 tests pass)
  psrm_reference:
    source_docs: docs/psrm-reference/
    enriched_petitions: [petition002, petition003, petition004, petition005, petition006, petition007, petition015, petition017, petition018, petition024, petition026]
    enrichment_date: 2026-03-16
    notes: >
      11 petitions enriched with "PSRM Reference Context" sections containing concrete
      Gaeldsstyrelsen PSRM business rules from gaeldst.dk/fordringshaver/find-vejledning/.
      Source material captured in docs/psrm-reference/ (16 reference documents).
  status_values:
    - not_started
    - architecture_ready
    - blocked
    - ready_for_implementation
    - in_progress
    - implemented
    - validated
  critical_path:
    - petition008
    - petition009
    - petition010
    - petition012
    - petition015
    - petition016
    - petition017
    - petition018
    - petition038
    - petition029
    - petition033
    - petition019

  # ===========================================================================
  # PHASE DEFINITIONS
  # ===========================================================================

  phases:
    - id: phase-0
      name: Existing implemented foundation
      objective: Preserve and validate already-built debt registration and payment-matching foundations.
      petitions:
        - petition001
        - petition002
      notes: Existing code indicates partial to full implementation, but petition002 still has channel gaps.

    - id: phase-1
      name: Core domain and creditor foundation
      objective: Establish fordring lifecycle semantics and creditor master-data ownership.
      petitions:
        - petition003
        - petition008
        - petition009
        - petition010

    - id: phase-2
      name: Creditor channels and UI compliance
      objective: Establish M2M ingress, portal BFF, and accessibility baseline.
      petitions:
        - petition011
        - petition012
        - petition013
        - petition014
        - petition019

    - id: phase-3
      name: Downstream collection model extensions
      objective: Extend the begrebsmodel into notifications, liabilities, objections, and collection steps.
      petitions:
        - petition004
        - petition005
        - petition006
        - petition007

    - id: phase-4
      name: Fordring claim validation rules
      objective: Implement comprehensive Drools-based validation rules for fordring claim ingestion, covering structure, authorization, lifecycle, and content validation.
      petitions:
        - petition015
        - petition016
        - petition017
        - petition018

    - id: phase-5
      name: Cross-cutting quality and observability
      objective: Implement non-functional quality requirements spanning all services.
      petitions:
        - petition020
        - petition021

    - id: phase-6
      name: Citizen portal (Skyldnerportal) landing page
      objective: Build the public-facing citizen portal landing page with informational content, FAQ, and MitID login link.
      petitions:
        - petition022

    - id: phase-7
      name: Citizen authentication and backend APIs
      objective: Establish person/CPR lookup, citizen-scoped debt endpoint, and MitID/TastSelv OAuth2 browser flow.
      petitions:
        - petition023
        - petition024
        - petition025

    - id: phase-8
      name: Citizen self-service and integrations
      objective: Deliver the authenticated debt overview page, citizen payment initiation, and Digital Post letter retrieval.
      petitions:
        - petition026
        - petition027
        - petition028

    - id: phase-9
      name: Creditor portal feature pages
      objective: >
        Deliver the full creditor portal functional surface: claims lists, detail views, hearing management,
        rejected claims, claim creation wizard, write-up/write-down, notifications, reconciliation, reports,
        and dashboard with navigation. These pages build on the BFF foundation (petition012) and backend
        services already implemented.
      petitions:
        - petition029
        - petition030
        - petition031
        - petition032
        - petition033
        - petition034
        - petition035
        - petition036
        - petition037
        - petition038
      notes: >
        Phase 9 represents the bulk of the creditor-facing user experience. Petition038 (dashboard and
        navigation) should be implemented first as it establishes the portal navigation structure.
        Petition029 (claims list) and petition030 (claim detail) are the core data views. Petition033
        (claim creation wizard) is the primary transactional page. Petitions 031-032 (hearing, rejected)
        require backend hearing and validation infrastructure. Petitions 035-037 (notifications,
        reconciliation, reports) require backend modules not yet built.

  # ===========================================================================
  # PETITION STATUS
  # ===========================================================================

  petitions:
    # --- Phase 0: Foundation ---

    petition001:
      title: OCR-based matching of incoming payments
      status: implemented
      phase: phase-0
      depends_on: []
      last_reviewed: 2026-03-17
      evidence:
        - opendebt-payment-service payment matching module is marked Done in docs/architecture-overview.md
        - debt-service exposes OCR lookup and write-down endpoints
      next_step: Revalidate against petition outcome contract during broader program review.

    petition002:
      title: Creditor creation of a new fordring
      status: in_progress
      phase: phase-0
      psrm_enriched: true
      depends_on:
        - petition011
        - petition012
      last_reviewed: 2026-03-17
      blockers:
        - Portal claim creation wizard is defined in petition033 but not yet implemented.
        - M2M ingress (petition011) is ready for implementation but not started.
      notes: >
        Debt creation exists in debt-service, but the petition is not fully satisfied end-to-end.
        The portal path for manual submission is now decomposed into petition033 (claim creation wizard).
        PSRM enrichment reveals 22 stamdata fields, hearing workflow, and pre-submission requirements.
      psrm_additions:
        - 22 stamdata fields with obligatorisk/valgfri classification for fordring creation
        - HOERING workflow for fordringer deviating from indgangsfilter (14-day SLA)
        - Pre-submission requirements (rykkerprocedure, underretning, claim separation)
        - Kvittering response with fordrings-ID, haeftelsesforhold, AKR-nummer, slutstatus (UDFOERT/AFVIST/HOERING)
        - GDPR constraint on Beskrivelse field
      next_step: Complete petition011 (M2M ingress) and petition033 (portal wizard), then reassess completion.

    # --- Phase 1: Core domain and creditor foundation ---

    petition003:
      title: Formalization of fordring, restance, and overdragelse til inddrivelse
      status: ready_for_implementation
      phase: phase-1
      psrm_enriched: true
      depends_on:
        - petition002
      last_reviewed: 2026-03-17
      psrm_additions:
        - SRB must have expired before overdragelse (PSRM rejects otherwise)
        - Claim separation rules -- hovedfordringer and renter must be separate fordringer
        - 0-fordring pattern -- when hovedfordring is paid, submit 0-saldo fordring before related renter
        - Post-overdragelse lifecycle -- inddrivelsesrente at 5.75% from 1st of month following receipt
        - Kvittering with fordrings-ID, haeftelsesforhold, AKR-nummer, slutstatus
        - All medhaeftere must be reported simultaneously at overdragelse
      next_step: Implement lifecycle model with PSRM-informed state transitions, 0-fordring support, and claim separation enforcement in debt-service. Tracked in Wave 7 (W7-LIFE-01, W7-ZERO-01).

    petition008:
      title: Fordringshaver logical and physical data model
      status: implemented
      phase: phase-1
      depends_on: []
      last_reviewed: 2026-03-17
      evidence:
        - petition008 outcome contract and feature file exist
        - opendebt-creditor-service CreditorEntity and Flyway V1 implement the operational creditor model
        - opendebt-person-registry OrganizationController keeps organization identity outside creditor-service
      next_step: Use petition008 as the reference model for future creditor-service enhancements and downstream creditor-channel work.

    petition009:
      title: Dedicated fordringshaver master data service
      status: validated
      phase: phase-1
      depends_on:
        - petition008
      last_reviewed: 2026-03-17
      evidence:
        - 12 Cucumber scenarios pass
        - CreditorArchitectureTest enforces package layering and shared arch rules
        - All 38 creditor-service tests pass
      next_step: Complete. Reference model for downstream work.

    petition010:
      title: Fordringshaver channel binding and access resolution
      status: implemented
      phase: phase-1
      depends_on:
        - petition009
      last_reviewed: 2026-03-17
      evidence:
        - 3 Cucumber scenarios pass (bound M2M, parent-child, unbound rejection)
        - 11 unit tests for binding CRUD and access resolution
        - All 38 creditor-service tests pass
      next_step: Execute W1-ACC-03 to wire shared access resolution into integration-gateway, creditor-portal, and debt-service.

    # --- Phase 2: Creditor channels and UI compliance ---

    petition011:
      title: Fordringshaver M2M ingress via integration-gateway
      status: ready_for_implementation
      phase: phase-2
      depends_on:
        - petition009
        - petition010
      last_reviewed: 2026-03-17
      next_step: Implement external creditor ingress in integration-gateway using creditor-service resolution.

    petition012:
      title: Fordringshaverportal as BFF and manual submission channel
      status: validated
      phase: phase-2
      depends_on:
        - petition009
        - petition010
        - petition013
        - petition014
      last_reviewed: 2026-03-17
      evidence:
        - 3 Cucumber scenarios pass
        - 48 tests pass (39 unit + 9 BDD)
        - Portal starts with dev profile and serves all pages
        - Thymeleaf + HTMX + SKAT standardlayout fully operational
      next_step: Foundation for Phase 9 creditor portal feature pages (petitions 029-038).

    petition013:
      title: UI webtilgaengelighed compliance
      status: validated
      phase: phase-2
      depends_on: []
      last_reviewed: 2026-03-17
      evidence:
        - 3 BDD scenarios pass
        - Skip link, landmarks, form-field fragment with aria, a11y.js focus management all in place
      next_step: Complete. Accessibility infrastructure reused by all portal pages.

    petition014:
      title: Accessibility statements and feedback for each UI
      status: validated
      phase: phase-2
      depends_on:
        - petition013
      last_reviewed: 2026-03-17
      evidence:
        - 3 BDD scenarios pass
        - /was statement page with contact info, enforcement link, last-updated date
        - Footer link discoverable on all pages
      next_step: Complete. Each new portal (citizen) gets its own /was page.

    petition019:
      title: Legacy SOAP endpoints for external creditors
      status: ready_for_implementation
      phase: phase-2
      depends_on:
        - petition015
        - petition016
        - petition017
        - petition018
      last_reviewed: 2026-03-17
      evidence:
        - petition019 outcome contract and feature file (37 scenarios) exist
        - All dependency petitions (015-018) are now implemented
      notes: All validation rule dependencies are satisfied. SOAP endpoint implementation can proceed.
      next_step: Implement Spring-WS endpoint handlers in integration-gateway. Validation rules from petition015-018 are ready.

    # --- Phase 3: Downstream collection model ---

    petition004:
      title: Underretning, paakrav, and rykker
      status: architecture_ready
      phase: phase-3
      psrm_enriched: true
      depends_on:
        - petition003
      last_reviewed: 2026-03-17
      psrm_additions:
        - 6 PSRM underretningsmeddelelse types defined
        - Afregning sent monthly (last business day)
        - Udligning vs Allokering mutually exclusive per fordringshaver
        - Notifications older than 3 months cannot be fetched
        - Skriftlig underretning required before overdragelse and opskrivning
        - Individual underretning required for each medhaefter
      next_step: Implement in Wave 7 sprint-13 (W7-UND-01). Also feeds petition035 (portal notification view).

    petition005:
      title: Haeftelse for multiple skyldnere
      status: architecture_ready
      phase: phase-3
      psrm_enriched: true
      depends_on:
        - petition003
      last_reviewed: 2026-03-17
      psrm_additions:
        - PSRM only supports solidarisk haeftelse
        - HAFT tilbagekald workflow
        - I/S and PEF skyldner rules
      next_step: Implement in Wave 7 sprint-13 (W7-HAFT-01, W7-HAFT-02).

    petition006:
      title: Indsigelse workflow blockering
      status: architecture_ready
      phase: phase-3
      psrm_enriched: true
      depends_on:
        - petition003
      last_reviewed: 2026-03-17
      psrm_additions:
        - KLAG/HENS tilbagekald workflows
        - FEJL outcome for KLAG
        - GenindsendFordring function
      next_step: Implement in Wave 7 sprint-13 (W7-INDS-01, W7-INDS-02).

    petition007:
      title: Inddrivelsesskridt for modregning, loenindeholdelse, and udlaeg
      status: architecture_ready
      phase: phase-3
      psrm_enriched: true
      depends_on:
        - petition003
      last_reviewed: 2026-03-17
      psrm_additions:
        - Civilretlige fordringer constraints
        - 100K betalingspaakrav threshold
        - Daekningsraekkefoelge rules
      next_step: Implement in Wave 7 sprint-14 (W7-INDR-01, W7-INDR-02, W7-AFSK-01).

    # --- Phase 4: Fordring claim validation rules ---

    petition015:
      title: Fordring core claim validation rules
      status: implemented
      phase: phase-4
      psrm_enriched: true
      depends_on: []
      last_reviewed: 2026-03-17
      evidence:
        - W2-RULE-01 complete -- 23 core validation rules in fordring-validation.drl
        - 43 unit tests for core rules plus 92 existing tests = 135 total passing
        - Rules cover structure, currency, art type, interest rate, dates, agreement, debtor
      psrm_additions:
        - Cross-reference to PSRM stamdata field definitions
        - Submission outcome mapping (UDFOERT/AFVIST/HOERING)
      next_step: Complete. Integration with ingestion pipeline tracked in W2-INT-01.

    petition016:
      title: Fordring claimant authorization rules
      status: implemented
      phase: phase-4
      depends_on:
        - petition015
      last_reviewed: 2026-03-17
      evidence:
        - W2-RULE-02 complete -- 14 authorization rules in fordring-validation.drl
        - 33 unit tests covering all 26 feature scenarios
        - All 210 rules-engine tests pass
      next_step: Complete. Integration with ingestion pipeline tracked in W2-INT-01.

    petition017:
      title: Fordring claim lifecycle and reference rules
      status: implemented
      phase: phase-4
      psrm_enriched: true
      depends_on:
        - petition015
        - petition016
      last_reviewed: 2026-03-17
      evidence:
        - W2-RULE-03 complete -- 32 lifecycle/reference rules in fordring-validation.drl
        - 40 unit tests covering all 32 feature scenarios
        - All 343 rules-engine tests pass
      psrm_additions:
        - Full tilbagekald aarsagskode mapping
        - GenindsendFordring constraint table
        - Opskrivning/nedskrivning reason codes
      next_step: Complete. Integration with ingestion pipeline tracked in W2-INT-01.

    petition018:
      title: Fordring claim content validation rules
      status: implemented
      phase: phase-4
      psrm_enriched: true
      depends_on:
        - petition015
        - petition016
        - petition017
      last_reviewed: 2026-03-17
      evidence:
        - W2-RULE-04 complete -- 45 content validation rules in fordring-validation.drl
        - 55 unit tests covering all 44+ feature scenarios
        - All 534 rules-engine tests pass
      psrm_additions:
        - PSRM interest regime cross-reference
        - Hovedstol and nedskriv constraints
      next_step: Complete. Integration with ingestion pipeline tracked in W2-INT-01.

    # --- Phase 5: Cross-cutting quality ---

    petition020:
      title: OpenTelemetry-based observability
      status: validated
      phase: phase-5
      depends_on: []
      last_reviewed: 2026-03-17
      evidence:
        - W4-OTEL-01 through W4-OTEL-05 all done
        - micrometer-tracing-bridge-otel in all 12 service POMs
        - docker-compose.observability.yml with Grafana stack (OTel Collector, Tempo, Loki, Prometheus, Grafana)
        - config/otel/, config/tempo/, config/loki/, config/prometheus/, config/grafana/ all provisioned
        - Structured JSON logging with traceId/spanId in all services
        - Custom business metrics (creditor_access_resolution_total, fordring_submissions_total)
        - All existing tests pass with tracing enabled
      next_step: Complete. Observability infrastructure is operational for all services.

    petition021:
      title: Internationalization (i18n) infrastructure for all OpenDebt portals
      status: validated
      phase: phase-5
      depends_on: []
      last_reviewed: 2026-03-17
      evidence:
        - I18nConfig, I18nProperties, I18nModelAdvice fully implemented
        - messages_da.properties (83 keys), messages_en_GB.properties, messages_sjn.properties (Sindarin)
        - 5 BDD scenarios pass (default Danish, switch to English, persistence, fallback, selector)
        - 54 total tests pass
        - translator-droid registered at .factory/droids/translator.md
      next_step: Complete. i18n infrastructure reusable for citizen portal (petition022).

    # --- Phase 6: Citizen portal landing page ---

    petition022:
      title: Skyldnerportal (citizen portal) landing page
      status: not_started
      phase: phase-6
      depends_on:
        - petition013
        - petition014
        - petition021
      last_reviewed: 2026-03-17
      notes: >
        All dependencies are now validated. Implementation can begin immediately.
        Wave 6 execution backlog (W6-CP-01 through W6-CP-12) is fully planned.
        opendebt-citizen-portal module exists as skeleton (Spring Boot app, no UI templates yet).
      next_step: Execute Wave 6 (W6-CP-01 through W6-CP-12) to build the citizen portal landing page.

    # --- Phase 7: Citizen authentication and backend APIs ---

    petition023:
      title: Person Registry citizen (CPR) lookup API
      status: not_started
      phase: phase-7
      depends_on: []
      last_reviewed: 2026-03-17
      notes: >
        Foundational API for citizen portal authentication. Also required by petition033
        (creditor portal claim creation wizard) for debtor CPR verification.
      next_step: Implement PersonController and PersonService in person-registry.

    petition024:
      title: Citizen-facing debt summary endpoint
      status: not_started
      phase: phase-7
      psrm_enriched: true
      depends_on:
        - petition023
      last_reviewed: 2026-03-17
      next_step: Implement after petition023 person-id resolution is available.

    petition025:
      title: MitID/TastSelv OAuth2 browser flow for citizen portal
      status: not_started
      phase: phase-7
      depends_on:
        - petition023
      last_reviewed: 2026-03-17
      next_step: Implement after petition023 CPR lookup is available.

    # --- Phase 8: Citizen self-service and integrations ---

    petition026:
      title: "\"Mit gaeldsoverblik\" authenticated citizen debt overview page"
      status: not_started
      phase: phase-8
      psrm_enriched: true
      depends_on:
        - petition022
        - petition024
        - petition025
      last_reviewed: 2026-03-17
      next_step: Implement after petitions 024 and 025 provide auth and data access.

    petition027:
      title: Citizen payment initiation API and self-service payment
      status: not_started
      phase: phase-8
      depends_on:
        - petition024
        - petition026
      last_reviewed: 2026-03-17
      next_step: Implement after petition026 debt overview page provides the payment entry point.

    petition028:
      title: Digital Post integration for citizen letter retrieval
      status: not_started
      phase: phase-8
      depends_on:
        - petition025
        - petition026
      last_reviewed: 2026-03-17
      next_step: Implement after petition025 provides citizen authentication.

    # --- Phase 9: Creditor portal feature pages ---

    petition029:
      title: Fordringshaverportal -- Claims in recovery and zero-balance claims lists
      status: implemented
      phase: phase-9
      depends_on:
        - petition012
        - petition038
      last_reviewed: 2026-03-17
      notes: >
        Paginated, sortable, searchable list views for claims in recovery (fordringer i inddrivelse)
        and zero-balance claims (nulfordringer), plus count views. Data from debt-service via BFF.
        Replaces legacy PSRM DKGetClaimsForClaimant / DKGetZeroClaimsCountForClaimant.
        Requires CREDITOR_VIEWER or CREDITOR_EDITOR roles. Uses HTMX for progressive loading.
      next_step: Implement after petition038 (navigation structure) establishes the portal page routing.

    petition030:
      title: Fordringshaverportal -- Claim detail view
      status: implemented
      phase: phase-9
      depends_on:
        - petition029
        - petition012
      last_reviewed: 2026-03-17
      notes: >
        Comprehensive claim detail page: claim info, financial breakdown, write-ups, write-downs,
        related claims (underfordringer), debtor info, court decisions. Collapsible sections.
        Replaces legacy PSRM DKClaimDetails. Accessed by clicking a row in petition029 list.
      next_step: Implement after petition029 claims list provides the navigation path.

    petition031:
      title: Fordringshaverportal -- Claims in hearing
      status: implemented
      phase: phase-9
      depends_on:
        - petition012
        - petition038
      last_reviewed: 2026-03-17
      notes: >
        List and detail views for claims in hearing (hoering). Editors can approve (with justification)
        or withdraw hearing claims. Status transitions to Afventer-Gaeldsstyrelsen after approval.
        14-day SLA tracking. Requires hearing backend (W7-HEAR-01) for full functionality.
      backend_dependencies:
        - W7-HEAR-01 (hearing workflow in debt-service)
      next_step: Implement portal views after petition038 navigation is in place. Full functionality requires Wave 7 hearing backend.

    petition032:
      title: Fordringshaverportal -- Rejected claims
      status: implemented
      phase: phase-9
      depends_on:
        - petition012
        - petition038
        - petition015
        - petition016
        - petition017
        - petition018
      last_reviewed: 2026-03-17
      notes: >
        List and detail views for rejected claims. Shows validation error codes and descriptions
        from petitions 015-018. Displays debtor info, caseworker remarks, rejection reasons.
        Replaces legacy NyMF AfvistAktionerSoeg.
      next_step: Implement portal views. Validation rules (petition015-018) are already implemented.

    petition033:
      title: Fordringshaverportal -- Claim creation wizard
      status: implemented
      phase: phase-9
      depends_on:
        - petition012
        - petition038
        - petition008
        - petition009
        - petition023
      last_reviewed: 2026-03-17
      notes: >
        Multi-step wizard: debtor validation (CPR/CVR/SE/AKR), claim data entry (field visibility
        driven by creditor agreement), review, and submission. Submission outcomes: UDFOERT/AFVIST/HOERING.
        Replaces legacy NyMF CreateAndUpdateClaimClient. Requires petition023 for CPR verification.
        Requires CREDITOR_EDITOR role with allow_portal_actions and allow_create_recovery_claims.
      next_step: Implement after petition038 navigation and petition023 CPR lookup are available.

    petition034:
      title: Fordringshaverportal -- Write-up and write-down submission
      status: implemented
      phase: phase-9
      depends_on:
        - petition030
        - petition008
        - petition012
      last_reviewed: 2026-03-17
      notes: >
        From claim detail page (petition030), editors submit opskrivninger (write-ups) and
        nedskrivninger (write-downs). 8 update types governed by creditor agreement permission flags.
        Debtor selection for payment-related write-downs on multi-debtor claims.
      next_step: Implement after petition030 claim detail provides the entry point.

    petition035:
      title: Fordringshaverportal -- Notifications search and download
      status: implemented
      phase: phase-9
      depends_on:
        - petition012
        - petition038
        - petition004
      last_reviewed: 2026-03-17
      notes: >
        Search notifications by date range and type (7 PSRM types). Download as PDF/XML zip.
        Notification types governed by creditor agreement preferences. Requires backend notification
        storage (petition004 / W7-UND-01) for full functionality.
      backend_dependencies:
        - W7-UND-01 (notification domain model)
      next_step: Implement portal views after petition038 navigation. Full data requires Wave 7 notification backend.

    petition036:
      title: Fordringshaverportal -- Reconciliation
      status: implemented
      phase: phase-9
      depends_on:
        - petition012
        - petition038
        - petition008
      last_reviewed: 2026-03-17
      notes: >
        Reconciliation period list, detail with basis data (tilgang, tilbagekaldt, opskrevet,
        nedskrevet), and response submission (forklaret/uforklaret difference). Requires
        CREDITOR_RECONCILIATION role. Tamper-protected basis data. Requires backend reconciliation
        module (not yet defined as a petition).
      backend_dependencies:
        - Reconciliation module in debt-service (not yet petitioned)
      next_step: Implement portal views. Backend reconciliation module needs its own petition.

    petition037:
      title: Fordringshaverportal -- Monthly reports
      status: implemented
      phase: phase-9
      depends_on:
        - petition012
        - petition038
        - petition008
      last_reviewed: 2026-03-17
      notes: >
        Year/month browser for creditor reports. Download as zip. Server-side access control
        replaces legacy AES key encryption scheme. Requires backend reporting/storage module.
      backend_dependencies:
        - Reporting service/module (not yet petitioned)
      next_step: Implement portal views. Backend reporting module needs its own petition.

    petition038:
      title: Fordringshaverportal -- Dashboard, navigation, and settings
      status: implemented
      phase: phase-9
      depends_on:
        - petition012
        - petition008
        - petition009
        - petition010
        - petition021
      last_reviewed: 2026-03-17
      notes: >
        Dashboard homepage with summary counts (claims in recovery, hearing, rejected, zero-balance).
        Portal navigation with 10+ sections (role-based visibility). Default landing logic by role.
        Umbrella-user claimant selection. Settings page with creditor agreement view and contact
        email management. System status indicator. This is the ENTRY POINT for Phase 9 -- establishes
        the navigation structure all other portal feature pages plug into.
      next_step: Implement FIRST in Phase 9. All other petition029-037 pages depend on this navigation structure.

