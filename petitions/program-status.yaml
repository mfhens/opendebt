    - id: TB-009
      title: Inject RulesService into OverpaymentRulesServiceImpl
      status: not_started
      priority: medium
      created: 2026-03-15
      source: AIDEV-TODO in OverpaymentRulesServiceImpl.java:27
      description: |
        OverpaymentRulesServiceImpl returns a hardcoded PAYOUT default. Must inject
        RulesService from opendebt-rules-engine and replace with actual overpayment
