    - id: TB-026
      title: Cancel BFF timeline futures after 4-second timeout to free upstream threads
      status: not_started
      priority: medium
      created: 2026-03-23
      description: |
        The three portal BFF timeline controllers (CaseworkerTimelineController,
        CitizenTimelineController, CreditorTimelineController) use CompletableFuture.allOf
        to fan out to case-service, payment-service, and debt-service. A 4-second timeout is
        applied on the combined future, but the individual upstream WebClient requests are not
        cancelled when the timeout fires. This means upstream threads remain occupied until
        the WebClient connection/read timeout elapses. Fix by wiring cancellation: call
        future.cancel(true) on each per-service future inside the timeout catch block, and
        ensure the WebClient subscriptions are disposed accordingly.
      depends_on:
        - petition050

