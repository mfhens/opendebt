schema_version: 1

program:
  name: OpenDebt petition implementation program
  updated_at: 2026-03-14
  updated_by: factory-droid
  status_values:
    - not_started
    - architecture_ready
    - blocked
    - ready_for_implementation
    - in_progress
    - implemented
    - validated
  critical_path:
    - petition008
    - petition009
    - petition010
    - petition011
    - petition012
    - petition015
    - petition016
    - petition017
    - petition018
    - petition019

  phases:
    - id: phase-0
      name: Existing implemented foundation
      objective: Preserve and validate already-built debt registration and payment-matching foundations.
      petitions:
        - petition001
        - petition002
      notes: Existing code indicates partial to full implementation, but petition002 still has channel gaps.

    - id: phase-1
      name: Core domain and creditor foundation
      objective: Establish fordring lifecycle semantics and creditor master-data ownership.
      petitions:
        - petition003
        - petition008
        - petition009
        - petition010

    - id: phase-2
      name: Creditor channels and UI compliance
      objective: Establish M2M ingress, portal responsibility split, and accessibility baseline.
      petitions:
        - petition011
        - petition012
        - petition013
        - petition014
        - petition019

    - id: phase-3
      name: Downstream collection model extensions
      objective: Extend the begrebsmodel into notifications, liabilities, objections, and collection steps.
      petitions:
        - petition004
        - petition005
        - petition006
        - petition007

    - id: phase-4
      name: Fordring claim validation rules
      objective: Implement comprehensive Drools-based validation rules for fordring claim ingestion, covering structure, authorization, lifecycle, and content validation.
      petitions:
        - petition015
        - petition016
        - petition017
        - petition018

  petitions:
    petition001:
      title: OCR-based matching of incoming payments
      status: implemented
      phase: phase-0
      depends_on: []
      last_reviewed: 2026-03-09
      evidence:
        - opendebt-payment-service payment matching module is marked Done in docs/architecture-overview.md
        - debt-service exposes OCR lookup and write-down endpoints
      next_step: Revalidate against petition outcome contract during broader program review.

    petition002:
      title: Creditor creation of a new fordring
      status: in_progress
      phase: phase-0
      depends_on:
        - petition011
        - petition012
      last_reviewed: 2026-03-09
      blockers:
        - Portal path is not implemented.
        - M2M ingress is being redirected to the integration-gateway target architecture.
      notes: Debt creation exists in debt-service, but the petition is not fully satisfied end-to-end.
      next_step: Complete petitions011 and 012, then reassess petition002 completion.

    petition003:
      title: Formalization of fordring, restance, and overdragelse til inddrivelse
      status: ready_for_implementation
      phase: phase-1
      depends_on:
        - petition002
      last_reviewed: 2026-03-09
      next_step: Implement lifecycle model and transfer audit trail in debt-service.

    petition004:
      title: Underretning, paakrav, and rykker
      status: architecture_ready
      phase: phase-3
      depends_on:
        - petition003
      last_reviewed: 2026-03-09
      next_step: Reassess after petition003 lifecycle model is implemented.

    petition005:
      title: Haeftelse for multiple skyldnere
      status: architecture_ready
      phase: phase-3
      depends_on:
        - petition003
      last_reviewed: 2026-03-09
      next_step: Define debtor liability model after claim lifecycle semantics are in place.

    petition006:
      title: Indsigelse workflow blockering
      status: architecture_ready
      phase: phase-3
      depends_on:
        - petition003
      last_reviewed: 2026-03-09
      next_step: Revisit once objection and workflow boundaries are modeled.

    petition007:
      title: Inddrivelsesskridt for modregning, loenindeholdelse, and udlaeg
      status: architecture_ready
      phase: phase-3
      depends_on:
        - petition003
      last_reviewed: 2026-03-09
      next_step: Implement only after overdragelse til inddrivelse exists.

    petition008:
      title: Fordringshaver logical and physical data model
      status: ready_for_implementation
      phase: phase-1
      depends_on: []
      last_reviewed: 2026-03-09
      evidence:
        - petition008 outcome contract exists in petitions/petition008-fordringshaver-data-model-outcome-contract.md
        - petition008 feature exists in petitions/petition008-fordringshaver-data-model.feature
        - petition008 includes canonical invariant matrix and value-set decisions for W1 implementation
      notes: Petition008 is now an executable specification for creditor master-data implementation and now has frozen API-boundary assumptions for W1.
      next_step: Support W1-BOOT-01 and W1-BOOT-02 if implementation questions arise from the frozen model.

    petition009:
      title: Dedicated fordringshaver master data service
      status: in_progress
      phase: phase-1
      depends_on:
        - petition008
      last_reviewed: 2026-03-14
      evidence:
        - api-specs/openapi-creditor-service.yaml defines the internal creditor-service boundary
        - api-specs/openapi-person-registry-internal.yaml defines the organization lookup contract needed by creditor-service
        - api-specs/openapi-debt-service.yaml now aligns creditorId with technical creditor_org_id UUID semantics
        - W1-BOOT-01 creditor-service module bootstrapped with entities, DTOs, mapper, repository, service, controller
        - W1-BOOT-02 person-registry organization API exposed
        - W1-CRD-01 creditor persistence model with Flyway V1 migration, audit, indexes, constraints
        - W1-CRD-02 creditor lookup and admin APIs with unit tests
        - W1-CRD-03 status and permission validation with debt-service client wiring
        - Cucumber test infrastructure scaffolded with RunCucumberTest, Petition009Steps (13 scenarios, all pending)
      notes: Core creditor-service implementation is complete (W1-BOOT-01/02, W1-CRD-01/02/03 all done). Only W1-CRD-04 remains - implementing acceptance test step definitions and adding architecture tests.
      next_step: Execute W1-CRD-04 to implement all 13 Cucumber scenario step definitions, add ArchUnit architecture tests, and configure coverage gate. This unblocks Sprint 2 (W1-ACC-01).

    petition010:
      title: Fordringshaver channel binding and access resolution
      status: in_progress
      phase: phase-1
      depends_on:
        - petition009
      last_reviewed: 2026-03-14
      evidence:
        - W1-ACC-01 channel binding entity, Flyway V2 migration, repository, service, and tests implemented
        - ChannelBindingEntity with audit/history support via database triggers
        - ChannelBindingService with createBinding, resolveAccess, deactivateBinding operations
        - Access resolution supports direct identity binding and parent-child acting-on-behalf-of
        - 11 unit tests covering binding CRUD, access resolution, hierarchy validation, and error cases
      notes: W1-ACC-01 (channel binding model) is complete. W1-ACC-02 (access resolution engine and API endpoint) remains to expose the resolution as a REST API.
      next_step: Execute W1-ACC-02 to expose access-resolution as a REST endpoint and implement full petition010 BDD coverage.

    petition011:
      title: Fordringshaver M2M ingress via integration-gateway
      status: ready_for_implementation
      phase: phase-2
      depends_on:
        - petition009
        - petition010
      last_reviewed: 2026-03-09
      next_step: Implement external creditor ingress in integration-gateway using creditor-service resolution.

    petition012:
      title: Fordringshaverportal as BFF and manual submission channel
      status: ready_for_implementation
      phase: phase-2
      depends_on:
        - petition009
        - petition010
        - petition013
        - petition014
      last_reviewed: 2026-03-09
      next_step: Implement portal as BFF/manual channel only, with accessibility requirements included.

    petition013:
      title: UI webtilgaengelighed compliance
      status: ready_for_implementation
      phase: phase-2
      depends_on: []
      last_reviewed: 2026-03-09
      next_step: Apply accessibility requirements to creditor-portal and citizen-portal implementation work.

    petition014:
      title: Accessibility statements and feedback for each UI
      status: ready_for_implementation
      phase: phase-2
      depends_on:
        - petition013
      last_reviewed: 2026-03-09
      next_step: Establish statement rollout and footer/was discoverability conventions for each UI.

    petition015:
      title: Fordring core claim validation rules
      status: in_progress
      phase: phase-4
      depends_on: []
      last_reviewed: 2026-03-14
      evidence:
        - petition015 outcome contract exists in petitions/petition015-fordring-core-validation-rules-outcome-contract.md
        - petition015 feature file exists with 28 scenarios in petitions/petition015-fordring-core-validation-rules.feature
        - rules are derived from fordring integration API specification in rules-dmn/
        - existing rules-engine module has Drools KIE container, DroolsConfig, and 3 existing .drl rule files
        - existing RulesService interface covers readiness, interest, and collection priority but NOT fordring validation
        - W2-BOOT-01 complete — FordringErrorCode enum (22 codes), validation DTOs (Request/Result/Error), FordringValidationService interface and impl with isolated KIE session, placeholder DRL with fordring-validation agenda group, AbstractFordringRuleTest base class, 92 passing tests
      notes: W2-RULE-01 complete. All 23 core validation rules implemented in fordring-validation.drl covering structure (10 rules), currency (1 rule), art type (1 rule), interest rate (1 rule), dates (6 rules), agreement (3 rules), and debtor (1 rule). 43 new unit tests plus 92 existing tests all pass (135 total). Rules use the fordring-validation agenda group for isolation from existing rules.
      next_step: Execute W2-RULE-02 to implement claimant authorization rules (petition016) using the established validation infrastructure.

    petition016:
      title: Fordring claimant authorization rules
      status: ready_for_implementation
      phase: phase-4
      depends_on:
        - petition015
      last_reviewed: 2026-03-10
      evidence:
        - petition016 outcome contract exists in petitions/petition016-fordring-claimant-authorization-rules-outcome-contract.md
        - petition016 feature file exists with 26 scenarios in petitions/petition016-fordring-claimant-authorization-rules.feature
        - rules validate permissions from fordringhaveraftale
      notes: Authorization rules that validate fordringshaver permissions for specific action types. Requires ClaimantAgreementService integration. Depends on petition015 for core validation infrastructure.
      next_step: Implement W2-RULE-02 after core validation rules are in place.

    petition017:
      title: Fordring claim lifecycle and reference rules
      status: ready_for_implementation
      phase: phase-4
      depends_on:
        - petition015
        - petition016
      last_reviewed: 2026-03-10
      evidence:
        - petition017 outcome contract exists in petitions/petition017-fordring-lifecycle-reference-rules-outcome-contract.md
        - petition017 feature file exists with 32 scenarios in petitions/petition017-fordring-lifecycle-reference-rules.feature
        - rules enforce claim state transitions and cross-references
      notes: Lifecycle rules for genindsend (6 rules), tilbagekald (5 rules), action references (5 rules), opskrivning/nedskrivning references (12 rules), and state validation (4 rules). Requires claim repository lookups.
      next_step: Implement W2-RULE-03 after authorization rules are stable.

    petition018:
      title: Fordring claim content validation rules
      status: ready_for_implementation
      phase: phase-4
      depends_on:
        - petition015
        - petition016
        - petition017
      last_reviewed: 2026-03-10
      evidence:
        - petition018 outcome contract exists in petitions/petition018-fordring-content-validation-rules-outcome-contract.md
        - petition018 feature file exists with 44 scenarios in petitions/petition018-fordring-content-validation-rules.feature
        - rules validate amounts, types, documents, hovedstol, hæftelse, and routing
      notes: Most comprehensive validation petition with 44 scenarios covering claim amounts (5 rules), sub-claims (4 rules), interest (4 rules), nedskriv reasons (4 rules), documents/notes (6 rules), hovedstol (4 rules), hæftelse (6 rules), routing (4 rules), claim types (5 rules), and identifiers (3 rules). Requires configuration service for thresholds.
      next_step: Implement W2-RULE-04 after lifecycle rules are mostly complete.

    petition019:
      title: Legacy SOAP endpoints for external creditors
      status: ready_for_implementation
      phase: phase-2
      depends_on:
        - petition015
        - petition016
        - petition017
        - petition018
      last_reviewed: 2026-03-13
      evidence:
        - petition019 outcome contract exists in petitions/petition019-legacy-soap-endpoints-outcome-contract.md
        - petition019 feature file exists with 37 scenarios in petitions/petition019-legacy-soap-endpoints.feature
        - defines 6 SOAP services (3 OIO + 3 SKAT/PSRM) for legacy system integration
      notes: Provides backward-compatible SOAP endpoints for SKAT/DMI legacy systems. Requires OCES3 certificate authentication, CLS logging, and TLS 1.3. SOAP services delegate to same business logic as REST APIs. Depends on validation rules from petition015-018.
      next_step: Implement Spring-WS endpoint handlers after validation rules are in place from Wave 2.
