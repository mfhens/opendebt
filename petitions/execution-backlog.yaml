      sprint: sprint-3
      petitions:
        - petition016
      modules:
        - petitions
        - rules-dmn
      objective: Turn petition016 into an executable engineering contract for claimant authorization rules.
      entry_criteria:
        - W2-SPEC-01 is complete or in progress.
        - Fordringhaveraftale permission model is understood.
      deliverables:
