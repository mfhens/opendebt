      depends_on:
        - W1-ACC-02
      owner_role: Backend integration engineers by module
      parallelization: Split by module and run in parallel.

    W1-ACC-04:
      status: in_progress
      sprint: sprint-2
      petitions:
        - petition009
        - petition010
      modules:
        - docker-compose.yml
        - pom.xml
        - opendebt-creditor-service
        - opendebt-integration-gateway
        - opendebt-creditor-portal
        - opendebt-debt-service
      objective: Make Wave 1 runnable locally and in CI.
      entry_criteria:
        - W1-ACC-03 is complete.
      deliverables:
        - environment wiring for creditor-service
        - compose updates
        - CI inclusion and smoke path
        - final hardening checklist
      depends_on:
        - W1-ACC-03
      owner_role: Platform or backend engineer
      parallelization: Final convergence ticket for Wave 1.

