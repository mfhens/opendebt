      parallelization: Can overlap late with W2-RULE-01.

    W2-RULE-03:
      status: pending
      sprint: sprint-4
      petitions:
        - petition017
      modules:
        - opendebt-rules-engine
        - opendebt-debt-service
        - rules-dmn
      objective: Implement claim lifecycle and reference validation rules in Drools.
      entry_criteria:
        - W2-RULE-02 is complete.
        - Claim repository lookups are available.
      deliverables:
        - genindsend rules (6 rules)
        - tilbagekald rules (5 rules)
        - action reference rules (5 rules)
        - opskrivning/nedskrivning reference rules (12 rules)
        - state validation rules (4 rules)
        - unit tests for all 32 scenarios
      depends_on:
        - W2-RULE-02
