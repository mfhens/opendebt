      status: pending
      sprint: sprint-4
      petitions:
        - petition018
      modules:
        - opendebt-rules-engine
        - rules-dmn
      objective: Implement claim content validation rules in Drools.
      entry_criteria:
        - W2-RULE-03 is mostly complete.
        - Configuration service for thresholds is available.
      deliverables:
        - claim amount validation rules (5 rules)
        - sub-claim validation rules (4 rules)
        - interest validation rules (4 rules)
        - nedskriv reason validation rules (4 rules)
        - document and note validation rules (6 rules)
        - hovedstol validation rules (4 rules)
        - hæftelse validation rules (6 rules)
        - routing validation rules (4 rules)
        - claim type validation rules (5 rules)
        - identifier validation rules (3 rules)
        - unit tests for all 44 scenarios
      depends_on:
        - W2-RULE-03
        - W2-SPEC-04
      owner_role: Rules engine engineer
      parallelization: Can overlap late with W2-RULE-03.

    W2-INT-01:
      status: pending
      sprint: sprint-4
      petitions:
        - petition015
        - petition016
        - petition017
        - petition018
      modules:
        - opendebt-integration-gateway
        - opendebt-rules-engine
      objective: Wire fordring validation rules into integration-gateway claim ingestion.
      entry_criteria:
        - W2-RULE-04 is complete.
        - Integration-gateway Fordring endpoint exists.
      deliverables:
