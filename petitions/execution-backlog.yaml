      modules:
        - opendebt-rules-engine
        - opendebt-creditor-service
        - rules-dmn
      objective: Implement claimant authorization rules in Drools.
      entry_criteria:
        - W2-RULE-01 is mostly complete.
        - ClaimantAgreementService is available.
      deliverables:
