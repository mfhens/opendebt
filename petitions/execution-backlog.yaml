        - W2-SPEC-01
        - W2-SPEC-02
      owner_role: Domain architect plus QA/BDD lead
      parallelization: Can start while W2-RULE-01 is in progress.

    W2-SPEC-04:
      status: done
      sprint: sprint-4
      petitions:
        - petition018
      modules:
        - petitions
        - rules-dmn
      objective: Turn petition018 into an executable engineering contract for content validation rules.
      entry_criteria:
