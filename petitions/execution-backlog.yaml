schema_version: 1

backlog:
  name: OpenDebt execution backlog
  updated_at: 2026-03-22
  updated_by: factory-droid (added Wave 9 RBAC petition planning for petition048)
  psrm_reference: docs/psrm-reference/
  ticket_status_values:
    - pending
    - in_progress
    - blocked
    - done

  waves:
    - id: wave-1
      phase: phase-1
      name: Core domain and creditor foundation
      objective: Establish executable creditor specifications, bootstrap creditor-service, and deliver creditor master-data ownership plus access resolution foundations.
      sprints:
        - sprint-1
        - sprint-2

    - id: wave-2
      phase: phase-4
      name: Fordring claim validation rules
      objective: Implement Drools-based validation rules for fordring claim ingestion pipeline, covering core validation, authorization, lifecycle, and content validation phases.
      sprints:
        - sprint-3
        - sprint-4

    - id: wave-3
      phase: phase-2
      name: Creditor portal frontend
      objective: Deliver a functional creditor-portal using Thymeleaf + HTMX with SKAT visual identity, BFF wiring to backend services, accessibility compliance, and manual fordring submission.
      sprints:
        - sprint-5
        - sprint-6

    - id: wave-4
      phase: phase-5
      name: OpenTelemetry observability framework
      objective: Implement OpenTelemetry-based observability (structured JSON logging, distributed tracing, metrics) across creditor-related services, with Grafana stack backend for local dev.
      sprints:
        - sprint-7

    - id: wave-5
      phase: phase-5
      name: Internationalization (i18n) infrastructure
      objective: Extract all hardcoded Danish text from creditor-portal templates into message bundles, add English translations, implement shared i18n infrastructure (MessageSource, LocaleResolver, language selector) reusable by all portals.
      sprints:
        - sprint-8
        - sprint-9

    - id: wave-6
      phase: phase-6
      name: Citizen portal (Skyldnerportal) landing page
      objective: Build the public-facing citizen portal landing page with debt overview content, MitID CTA, FAQ section, accessibility statement, and full i18n — using the same Thymeleaf + HTMX + SKAT design language as the creditor portal.
      sprints:
        - sprint-10
        - sprint-11

    - id: wave-7
      phase: phase-3
      name: Downstream collection model (PSRM-enriched)
      objective: >
        Implement the downstream collection domain model informed by PSRM reference context:
        fordring lifecycle with 0-fordring support, 22 stamdata field validation, HØRING workflow,
        6 underretning types, solidarisk hæftelse with HAFT workflow, KLAG/HENS tilbagekald
        workflows, GenindsendFordring function, and inddrivelsesskridt with civilretlige constraints.
      sprints:
        - sprint-12
        - sprint-13
        - sprint-14

    - id: wave-8
      phase: phase-12
      name: Interest regime compliance and versioned configuration
      objective: Implement petition045 and petition046 for rate governance and multi-regime interest compliance.
      sprints:
        - sprint-15

    - id: wave-9
      phase: phase-13
      name: Role-based data access control hardening
      objective: Implement petition048 with strict RBAC data filtering for caseworker, supervisor, creditor, citizen, and VIP/PEP sensitivity handling.
      sprints:
        - sprint-16

  sprints:
    - id: sprint-1
      wave: wave-1
      name: Creditor-service foundation
      objective: Make petition008 executable and deliver the petition009 core.
    - id: sprint-2
      wave: wave-1
      name: Access resolution and consumer wiring
      objective: Deliver petition010 and wire shared access resolution into downstream consumers.
    - id: sprint-3
      wave: wave-2
      name: Fordring core validation and authorization
      objective: Implement petition015 core validation infrastructure and petition016 authorization rules.
    - id: sprint-4
      wave: wave-2
      name: Fordring lifecycle and content validation
      objective: Implement petition017 lifecycle rules and petition018 content validation rules.
    - id: sprint-5
      wave: wave-3
      name: Portal foundation and accessibility baseline
      objective: Bootstrap Thymeleaf + HTMX infrastructure, SKAT layout, accessibility patterns, and service client wiring.
    - id: sprint-6
      wave: wave-3
      name: Portal BFF and manual submission
      objective: Deliver creditor profile view, manual fordring submission, and petition012 acceptance coverage.
    - id: sprint-7
      wave: wave-4
      name: OpenTelemetry framework and creditor instrumentation
      objective: Add OTel dependencies, structured JSON logging, trace propagation, Docker Compose observability stack, and custom creditor business metrics.
    - id: sprint-8
      wave: wave-5
      name: i18n infrastructure and creditor-portal string extraction
      objective: Configure Spring i18n beans, extract all hardcoded Danish from creditor-portal templates into messages_da.properties, add language selector to layout header.
    - id: sprint-9
      wave: wave-5
      name: English translations and i18n acceptance testing
      objective: Generate messages_en_GB.properties using translator-droid, add BDD scenarios for language switching, verify existing tests pass after refactoring.
    - id: sprint-10
      wave: wave-6
      name: Citizen portal infrastructure and landing page
      objective: Bootstrap Thymeleaf + HTMX stack in citizen portal, duplicate i18n infrastructure, create SKAT-branded citizen layout, implement landing page controller and template with FAQ section.
    - id: sprint-11
      wave: wave-6
      name: Citizen portal i18n, security, and acceptance
      objective: Create Danish and English message bundles, configure SecurityConfig for public access, add accessibility statement, write BDD acceptance tests, and converge.
    - id: sprint-12
      wave: wave-7
      name: Fordring lifecycle, stamdata, and hearing workflow
      objective: >
        Implement PSRM-informed fordring lifecycle model (restance transition, overdragelse pre-conditions),
        22 stamdata field validation with obligatorisk/valgfri classification, 0-fordring pattern for
        renter on indfriet hovedfordring, HØRING workflow for indgangsfilter deviations, and kvittering
        response model.
    - id: sprint-13
      wave: wave-7
      name: Underretning model, hæftelse, and tilbagekald workflows
      objective: >
        Implement 6 PSRM underretning types (Afregning, Udligning, Allokering, Renter, Afskrivning,
        Tilbagesend), solidarisk hæftelse model with HAFT/KLAG/HENS tilbagekald workflows,
        GenindsendFordring function, and I/S/PEF skyldner rules.
    - id: sprint-14
      wave: wave-7
      name: Inddrivelsesskridt and civilretlige constraints
      objective: >
        Implement inddrivelsesskridt domain model for modregning, lønindeholdelse, and udlæg with
        civilretlige fordringer constraints, 100K betalingspåkrav threshold, dækningsrækkefølge
        (rente before hovedstol), and afskrivning reason codes.
    - id: sprint-15
      wave: wave-8
      name: Interest and config governance implementation
      objective: Implement petition045 and petition046, including versioned business configuration and compliance-focused interest calculation.
    - id: sprint-16
      wave: wave-9
      name: RBAC access control and sensitivity enforcement
      objective: Implement petition048 authorization rules with role-scoped data access, VIP/PEP restrictions, and cross-service enforcement tests.

  tickets:
    W1-SPEC-01:
      status: done
      sprint: sprint-1
      petitions:
        - petition008
      modules:
        - petitions
        - api-specs
      objective: Turn petition008 into an executable engineering contract.
      entry_criteria:
        - ADR-0020 is accepted.
        - petition008 remains the source model for creditor data.
      deliverables:
        - petition008 outcome contract
        - petition008 feature file
        - canonical creditor field and invariant matrix
        - explicit enum and value-set decisions
      depends_on: []
      owner_role: Domain architect plus QA/BDD lead
      parallelization: Must complete before coding starts.

    W1-SPEC-02:
      status: done
      sprint: sprint-1
      petitions:
        - petition008
        - petition009
      modules:
        - api-specs
        - opendebt-person-registry
        - opendebt-debt-service
        - opendebt-creditor-service
      objective: Freeze internal API boundaries and identifier semantics for creditor-service.
      entry_criteria:
        - W1-SPEC-01 is complete.
      deliverables:
        - draft openapi-creditor-service contract
        - organization lookup contract for person-registry
        - debt-service identifier alignment note for creditor_org_id usage
        - consumer call-flow mapping
      depends_on:
        - W1-SPEC-01
