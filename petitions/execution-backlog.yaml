        - architecture tests for rule organization
        - rules coverage gate
        - validation pipeline smoke tests
      depends_on:
        - W2-INT-01
      owner_role: QA automation plus rules engineer
      parallelization: Final convergence ticket for Wave 2.

    # Wave 3: Creditor Portal Frontend

    W3-SPEC-01:
      status: done
      sprint: sprint-5
      petitions:
        - petition012
        - petition013
        - petition014
      modules:
        - petitions
        - opendebt-creditor-portal
      objective: Define portal page inventory, screen layouts (aligned to skat.dk/borger), and accessibility acceptance criteria.
      entry_criteria:
        - ADR-0023 is accepted.
        - petition012, petition013, petition014 artifacts exist.
      deliverables:
        - portal page inventory mapping petition012 scenarios to screens
        - SKAT-aligned layout wireframes (header, breadcrumb, content, footer)
        - accessibility acceptance criteria checklist derived from petition013
        - accessibility statement template derived from petition014
      depends_on: []
      owner_role: UX lead plus domain architect
      parallelization: Must complete before UI coding starts.

    W3-BOOT-01:
      status: done
      sprint: sprint-5
      petitions:
        - petition012
        - petition013
      modules:
        - opendebt-creditor-portal
      objective: Bootstrap Thymeleaf and HTMX infrastructure with SKAT layout in the creditor-portal module.
      entry_criteria:
        - W3-SPEC-01 is complete.
        - ADR-0023 is accepted.
        - skat-tokens.css exists in static resources.
      deliverables:
        - spring-boot-starter-thymeleaf dependency added to pom.xml
        - thymeleaf-layout-dialect dependency for shared page structure
        - HTMX 2.x JS file in static resources or via WebJar
        - base Thymeleaf layout template (layout.html) with SKAT-style header, breadcrumb, content area, footer
        - skip-link, landmark regions, language meta for accessibility
        - IBM Plex Sans font integration
        - application.yml Thymeleaf config (prefix, suffix, cache)
        - landing page controller and template to verify stack works
      depends_on:
        - W3-SPEC-01
      owner_role: Frontend-capable backend engineer
      parallelization: Can run in parallel with W3-BOOT-02.

    W3-BOOT-02:
      status: done
      sprint: sprint-5
      petitions:
        - petition012
      modules:
        - opendebt-creditor-portal
      objective: Create service client layer for creditor-service, debt-service, and case-service.
      entry_criteria:
        - W3-SPEC-01 is complete.
        - creditor-service API is stable (W1-ACC-02 done).
      deliverables:
        - CreditorServiceClient (getByCreditorOrgId, resolveAccess)
        - DebtServiceClient (listDebts, createDebt)
        - CaseServiceClient (listCases)
        - WebClient configuration with OAuth2 token relay
        - unit tests for each client with WireMock stubs
      depends_on:
        - W3-SPEC-01
      owner_role: Backend engineer
      parallelization: Can run in parallel with W3-BOOT-01.

    W3-A11Y-01:
      status: done
      sprint: sprint-5
      petitions:
        - petition013
        - petition014
      modules:
        - opendebt-creditor-portal
      objective: Implement accessibility infrastructure and statement.
      entry_criteria:
        - W3-BOOT-01 layout template exists.
      deliverables:
        - accessibility statement page (/was) with WAS-Tool generated content placeholder
        - footer link to accessibility statement on every page
        - keyboard navigation verification for base layout
        - form error association pattern (aria-describedby)
        - focus management pattern for page transitions
        - axe-core or Pa11y CI integration for automated accessibility checks
        - petition013 and petition014 Cucumber feature files wired for acceptance
      depends_on:
        - W3-BOOT-01
      owner_role: Accessibility-aware frontend engineer
      parallelization: Can run alongside W3-BOOT-02.

    W3-PAGE-01:
      status: done
      sprint: sprint-6
      petitions:
        - petition012
      modules:
        - opendebt-creditor-portal
      objective: Implement creditor profile view page.
      entry_criteria:
        - W3-BOOT-01 layout is working.
        - W3-BOOT-02 CreditorServiceClient is available.
      deliverables:
        - /dashboard controller reading creditor profile from creditor-service
        - Thymeleaf template showing creditor master data (externalCreditorId, activityStatus, connectionType, hierarchy)
        - HTMX-enhanced status refresh
        - access resolution on login to determine acting fordringshaver
        - petition012 scenario 1 covered (portal reads creditor profile from backend service)
      depends_on:
        - W3-BOOT-01
        - W3-BOOT-02
      owner_role: Backend engineer with Thymeleaf
      parallelization: Can run in parallel with W3-PAGE-02.

    W3-PAGE-02:
      status: done
      sprint: sprint-6
      petitions:
        - petition012
      modules:
        - opendebt-creditor-portal
        - opendebt-debt-service
      objective: Implement manual fordring submission page.
      entry_criteria:
        - W3-BOOT-01 layout is working.
        - W3-BOOT-02 DebtServiceClient is available.
        - W3-A11Y-01 form patterns are established.
      deliverables:
        - /fordring/ny controller with form binding and server-side validation
        - Thymeleaf template with accessible form (labels, error associations, fieldsets)
        - HTMX inline validation feedback on blur
        - submission routes to debt-service via DebtServiceClient
        - success/error feedback page
        - petition012 scenario 2 covered (manual fordring submitted to debt-service)
      depends_on:
        - W3-BOOT-01
        - W3-BOOT-02
        - W3-A11Y-01
      owner_role: Backend engineer with Thymeleaf
      parallelization: Can run in parallel with W3-PAGE-01.

    W3-SEC-01:
      status: done
      sprint: sprint-6
      petitions:
        - petition012
      modules:
        - opendebt-creditor-portal
      objective: Enforce acting-on-behalf-of restrictions in the portal.
      entry_criteria:
        - W3-PAGE-01 creditor profile view exists.
        - Access resolution endpoint is available (W1-ACC-02 done).
      deliverables:
        - login flow resolves acting fordringshaver via creditor-service access resolution
        - acting-on-behalf-of selector for parent creditors (uses hierarchy from creditor-service)
        - unrelated creditor access is rejected and shown as error
        - petition012 scenario 3 covered (user cannot act for unrelated fordringshaver)
      depends_on:
        - W3-PAGE-01
      owner_role: Security-aware backend engineer
      parallelization: Blocks petition012 full acceptance.

    W3-ACC-01:
      status: done
      sprint: sprint-6
      petitions:
        - petition012
        - petition013
        - petition014
      modules:
        - opendebt-creditor-portal
      objective: Make petition012, 013, 014 acceptance tests executable and protect the portal with coverage.
      entry_criteria:
        - W3-PAGE-01, W3-PAGE-02, W3-SEC-01 are complete.
        - W3-A11Y-01 accessibility infrastructure is in place.
      deliverables:
        - Cucumber acceptance coverage for petition012 (3 scenarios)
        - Cucumber acceptance coverage for petition013 (3 scenarios)
        - Cucumber acceptance coverage for petition014 (3 scenarios)
        - architecture tests for portal package layering
        - portal coverage gate (JaCoCo)
        - local smoke test via docker compose
      depends_on:
        - W3-PAGE-01
        - W3-PAGE-02
        - W3-SEC-01
        - W3-A11Y-01
      owner_role: QA automation plus frontend engineer
      parallelization: Final convergence ticket for Wave 3.

    # Wave 4: OpenTelemetry Observability

