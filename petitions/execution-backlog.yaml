schema_version: 1

backlog:
  name: OpenDebt execution backlog
  updated_at: 2026-03-10
  updated_by: factory-droid
  ticket_status_values:
    - pending
    - in_progress
    - blocked
    - done

  waves:
    - id: wave-1
      phase: phase-1
      name: Core domain and creditor foundation
      objective: Establish executable creditor specifications, bootstrap creditor-service, and deliver creditor master-data ownership plus access resolution foundations.
      sprints:
        - sprint-1
        - sprint-2

    - id: wave-2
      phase: phase-4
      name: Fordring claim validation rules
      objective: Implement Drools-based validation rules for fordring claim ingestion pipeline, covering core validation, authorization, lifecycle, and content validation phases.
      sprints:
        - sprint-3
        - sprint-4

  sprints:
    - id: sprint-1
      wave: wave-1
      name: Creditor-service foundation
      objective: Make petition008 executable and deliver the petition009 core.
    - id: sprint-2
      wave: wave-1
      name: Access resolution and consumer wiring
      objective: Deliver petition010 and wire shared access resolution into downstream consumers.
    - id: sprint-3
      wave: wave-2
      name: Fordring core validation and authorization
      objective: Implement petition015 core validation infrastructure and petition016 authorization rules.
    - id: sprint-4
      wave: wave-2
      name: Fordring lifecycle and content validation
      objective: Implement petition017 lifecycle rules and petition018 content validation rules.

  tickets:
    W1-SPEC-01:
      status: done
      sprint: sprint-1
      petitions:
        - petition008
      modules:
        - petitions
        - api-specs
      objective: Turn petition008 into an executable engineering contract.
      entry_criteria:
        - ADR-0020 is accepted.
        - petition008 remains the source model for creditor data.
      deliverables:
        - petition008 outcome contract
        - petition008 feature file
        - canonical creditor field and invariant matrix
        - explicit enum and value-set decisions
      depends_on: []
      owner_role: Domain architect plus QA/BDD lead
      parallelization: Must complete before coding starts.

    W1-SPEC-02:
      status: done
      sprint: sprint-1
      petitions:
        - petition008
        - petition009
      modules:
        - api-specs
        - opendebt-person-registry
        - opendebt-debt-service
        - opendebt-creditor-service
      objective: Freeze internal API boundaries and identifier semantics for creditor-service.
      entry_criteria:
        - W1-SPEC-01 is complete.
      deliverables:
        - draft openapi-creditor-service contract
        - organization lookup contract for person-registry
        - debt-service identifier alignment note for creditor_org_id usage
        - consumer call-flow mapping
      depends_on:
        - W1-SPEC-01
      owner_role: Solution architect or API lead
      parallelization: Must complete before service and client coding starts.

    W1-BOOT-01:
      status: done
      sprint: sprint-1
      petitions:
        - petition009
      modules:
        - pom.xml
        - docker-compose.yml
        - opendebt-creditor-service
      objective: Bootstrap a runnable creditor-service module in the monorepo.
      entry_criteria:
        - W1-SPEC-02 is complete.
      deliverables:
        - new Maven module
        - Spring Boot application skeleton
        - application.yml
        - package structure following project conventions
        - test skeleton
        - local compose wiring
      depends_on:
        - W1-SPEC-02
      owner_role: Platform or backend engineer
      parallelization: Can run in parallel with W1-BOOT-02.

    W1-BOOT-02:
      status: done
      sprint: sprint-1
      petitions:
        - petition008
        - petition009
      modules:
        - opendebt-person-registry
        - opendebt-common
      objective: Expose the minimum organization-reference API needed by creditor-service.
      entry_criteria:
        - W1-SPEC-02 is complete.
      deliverables:
        - organization DTOs where needed
        - read and exists style organization endpoints or equivalent service API
        - supporting tests
      depends_on:
        - W1-SPEC-02
      owner_role: Backend engineer for person-registry
      parallelization: Can run in parallel with W1-BOOT-01.

    W1-CRD-01:
      status: done
      sprint: sprint-1
      petitions:
        - petition009
      modules:
        - opendebt-creditor-service
      objective: Implement the operational creditor persistence model.
      entry_criteria:
        - W1-BOOT-01 has created the module skeleton.
        - petition008 field contract is frozen.
      deliverables:
        - creditor entities and enums
        - Flyway V1 migration
        - audit and history support
        - indexes and check constraints
        - parent-child hierarchy reference
      depends_on:
        - W1-BOOT-01
        - W1-SPEC-01
      owner_role: Backend engineer for creditor-service
      parallelization: Starts as soon as the module exists.

    W1-CRD-02:
      status: done
      sprint: sprint-1
      petitions:
        - petition009
      modules:
        - opendebt-creditor-service
      objective: Implement creditor lookup and administration APIs.
      entry_criteria:
        - W1-CRD-01 is mostly in place.
        - W1-BOOT-02 organization API is available.
      deliverables:
        - repository and service layer
        - controller endpoints for lookup and admin updates
        - mapping logic
        - unit tests
      depends_on:
        - W1-CRD-01
        - W1-BOOT-02
      owner_role: Backend engineer for creditor-service
      parallelization: Can overlap late with W1-CRD-03 once signatures stabilize.

    W1-CRD-03:
      status: done
      sprint: sprint-1
      petitions:
        - petition009
      modules:
        - opendebt-creditor-service
        - opendebt-debt-service
        - opendebt-common
      objective: Expose status and permission validation and enforce it in debt-service.
      entry_criteria:
        - W1-CRD-02 API signatures are stable.
      deliverables:
        - validate-action endpoint
        - debt-service client
        - pre-create and pre-update validation hook
        - integration-style tests
      depends_on:
        - W1-CRD-02
      owner_role: Backend integration engineer
      parallelization: Can run in parallel with W1-CRD-04.

    W1-CRD-04:
      status: pending
      sprint: sprint-1
      petitions:
        - petition009
      modules:
        - opendebt-creditor-service
      objective: Make petition009 acceptance executable and protect the new service with tests.
      entry_criteria:
        - W1-CRD-02 and W1-CRD-03 are implemented.
      deliverables:
        - Cucumber acceptance coverage for petition009
        - architecture tests
        - service coverage gate
      depends_on:
        - W1-CRD-02
        - W1-CRD-03
      owner_role: QA automation plus backend engineer
      parallelization: Can run alongside sprint hardening.

    W1-ACC-01:
      status: pending
      sprint: sprint-2
      petitions:
        - petition010
      modules:
        - opendebt-creditor-service
      objective: Add a first-class channel binding model for M2M and portal identities.
      entry_criteria:
        - petition009 core service exists.
      deliverables:
        - channel_bindings schema and entities
        - channel type enums
        - binding audit and history support
      depends_on:
        - W1-CRD-04
      owner_role: Backend engineer for creditor-service
      parallelization: Consumer teams can prep stubs in parallel once the contract is frozen.

    W1-ACC-02:
      status: pending
      sprint: sprint-2
      petitions:
        - petition010
      modules:
        - opendebt-creditor-service
        - api-specs
      objective: Implement the access-resolution engine and API.
      entry_criteria:
        - W1-ACC-01 is complete.
        - creditor lookup is already available.
      deliverables:
        - access resolve endpoint
        - acting versus represented creditor resolution
        - hierarchy-based rule enforcement
        - audited resolution outcomes
        - petition010 BDD coverage
      depends_on:
        - W1-ACC-01
      owner_role: Senior backend engineer
      parallelization: Blocks real downstream adoption.

    W1-ACC-03:
      status: pending
      sprint: sprint-2
      petitions:
        - petition010
      modules:
        - opendebt-integration-gateway
        - opendebt-creditor-portal
        - opendebt-debt-service
      objective: Make downstream consumers use shared access resolution.
      entry_criteria:
        - W1-ACC-02 contract is stable.
      deliverables:
        - creditor-service client in integration-gateway
        - creditor-service client in creditor-portal
        - creditor-service client in debt-service
        - targeted module tests
      depends_on:
        - W1-ACC-02
      owner_role: Backend integration engineers by module
      parallelization: Split by module and run in parallel.

    W1-ACC-04:
      status: pending
      sprint: sprint-2
      petitions:
        - petition009
        - petition010
      modules:
        - docker-compose.yml
        - pom.xml
        - opendebt-creditor-service
        - opendebt-integration-gateway
        - opendebt-creditor-portal
        - opendebt-debt-service
      objective: Make Wave 1 runnable locally and in CI.
      entry_criteria:
        - W1-ACC-03 is complete.
      deliverables:
        - environment wiring for creditor-service
        - compose updates
        - CI inclusion and smoke path
        - final hardening checklist
      depends_on:
        - W1-ACC-03
      owner_role: Platform or backend engineer
      parallelization: Final convergence ticket for Wave 1.

    # Wave 2: Fordring Validation Rules

    W2-SPEC-01:
      status: done
      sprint: sprint-3
      petitions:
        - petition015
      modules:
        - petitions
        - rules-dmn
      objective: Turn petition015 into an executable engineering contract for core fordring validation rules.
      entry_criteria:
        - Fordring rule specifications are extracted and understood.
        - ADR-0015 Drools Rules Engine decision is in place.
      deliverables:
        - petition015 outcome contract
        - petition015 feature file with 28 scenarios
        - Fordring error code mapping to Danish descriptions
        - validation rule categorization matrix
      depends_on: []
      owner_role: Domain architect plus QA/BDD lead
      parallelization: Must complete before rules coding starts.

    W2-SPEC-02:
      status: done
      sprint: sprint-3
      petitions:
        - petition016
      modules:
        - petitions
        - rules-dmn
      objective: Turn petition016 into an executable engineering contract for claimant authorization rules.
      entry_criteria:
        - W2-SPEC-01 is complete or in progress.
        - Fordringhaveraftale permission model is understood.
      deliverables:
        - petition016 outcome contract
        - petition016 feature file with 26 scenarios
        - permission type enumeration
        - ClaimantAgreementService contract definition
      depends_on:
        - W2-SPEC-01
      owner_role: Domain architect plus QA/BDD lead
      parallelization: Can run in parallel with W2-SPEC-01.

    W2-SPEC-03:
      status: done
      sprint: sprint-4
      petitions:
        - petition017
      modules:
        - petitions
        - rules-dmn
      objective: Turn petition017 into an executable engineering contract for lifecycle and reference rules.
      entry_criteria:
        - petition015 and petition016 specifications exist.
        - Claim state model is documented.
      deliverables:
        - petition017 outcome contract
        - petition017 feature file with 32 scenarios
        - claim lifecycle state diagram
        - action reference relationship model
      depends_on:
        - W2-SPEC-01
        - W2-SPEC-02
      owner_role: Domain architect plus QA/BDD lead
      parallelization: Can start while W2-RULE-01 is in progress.

    W2-SPEC-04:
      status: done
      sprint: sprint-4
      petitions:
        - petition018
      modules:
        - petitions
        - rules-dmn
      objective: Turn petition018 into an executable engineering contract for content validation rules.
      entry_criteria:
        - petition015 through petition017 specifications exist.
        - Configuration parameter model is documented.
      deliverables:
        - petition018 outcome contract
        - petition018 feature file with 44 scenarios
        - configurable threshold and limit specification
        - routing constraint matrix
      depends_on:
        - W2-SPEC-03
      owner_role: Domain architect plus QA/BDD lead
      parallelization: Can start while W2-RULE-02 is in progress.

    W2-BOOT-01:
      status: pending
      sprint: sprint-3
      petitions:
        - petition015
        - petition016
        - petition017
        - petition018
      modules:
        - pom.xml
        - opendebt-rules-engine
        - opendebt-common
      objective: Bootstrap Drools rules engine infrastructure for fordring validation.
      entry_criteria:
        - W2-SPEC-01 is complete.
        - ADR-0015 Drools decision is approved.
      deliverables:
        - Drools KIE container configuration
        - rule session management service
        - Fordring error code enumeration
        - validation result DTOs
        - test infrastructure for rule evaluation
      depends_on:
        - W2-SPEC-01
      owner_role: Rules engine engineer
      parallelization: Can run in parallel with W2-SPEC-02.

    W2-RULE-01:
      status: pending
      sprint: sprint-3
      petitions:
        - petition015
      modules:
        - opendebt-rules-engine
        - rules-dmn
      objective: Implement core fordring validation rules in Drools.
      entry_criteria:
        - W2-BOOT-01 is complete.
        - W2-SPEC-01 is frozen.
      deliverables:
        - structure validation rules (10 rules)
        - currency validation rule
        - art type validation rule
        - interest rate validation rule
        - date validation rules (6 rules)
        - agreement validation rules (3 rules)
        - debtor validation rule
        - unit tests for all 28 scenarios
      depends_on:
        - W2-BOOT-01
        - W2-SPEC-01
      owner_role: Rules engine engineer
      parallelization: Starts as soon as infrastructure exists.

    W2-RULE-02:
      status: pending
      sprint: sprint-3
      petitions:
        - petition016
      modules:
        - opendebt-rules-engine
        - opendebt-creditor-service
        - rules-dmn
      objective: Implement claimant authorization rules in Drools.
      entry_criteria:
        - W2-RULE-01 is mostly complete.
        - ClaimantAgreementService is available.
      deliverables:
        - system reporter validation rule
        - INDR/MODR permission rules
        - nedskriv permission rule
        - tilbagekald permission rule
        - portal submission permission rule
        - opskrivning/nedskrivning correction permission rules (5 rules)
        - hovedstol change permission rule
        - genindsend permission rule
        - SSO access validation rule
        - unit tests for all 26 scenarios
      depends_on:
        - W2-RULE-01
        - W2-SPEC-02
      owner_role: Rules engine engineer
      parallelization: Can overlap late with W2-RULE-01.

    W2-RULE-03:
      status: pending
      sprint: sprint-4
      petitions:
        - petition017
      modules:
        - opendebt-rules-engine
        - opendebt-debt-service
        - rules-dmn
      objective: Implement claim lifecycle and reference validation rules in Drools.
      entry_criteria:
        - W2-RULE-02 is complete.
        - Claim repository lookups are available.
      deliverables:
        - genindsend rules (6 rules)
        - tilbagekald rules (5 rules)
        - action reference rules (5 rules)
        - opskrivning/nedskrivning reference rules (12 rules)
        - state validation rules (4 rules)
        - unit tests for all 32 scenarios
      depends_on:
        - W2-RULE-02
        - W2-SPEC-03
      owner_role: Rules engine engineer
      parallelization: Starts when authorization rules are stable.

    W2-RULE-04:
      status: pending
      sprint: sprint-4
      petitions:
        - petition018
      modules:
        - opendebt-rules-engine
        - rules-dmn
      objective: Implement claim content validation rules in Drools.
      entry_criteria:
        - W2-RULE-03 is mostly complete.
        - Configuration service for thresholds is available.
      deliverables:
        - claim amount validation rules (5 rules)
        - sub-claim validation rules (4 rules)
        - interest validation rules (4 rules)
        - nedskriv reason validation rules (4 rules)
        - document and note validation rules (6 rules)
        - hovedstol validation rules (4 rules)
        - hæftelse validation rules (6 rules)
        - routing validation rules (4 rules)
        - claim type validation rules (5 rules)
        - identifier validation rules (3 rules)
        - unit tests for all 44 scenarios
      depends_on:
        - W2-RULE-03
        - W2-SPEC-04
      owner_role: Rules engine engineer
      parallelization: Can overlap late with W2-RULE-03.

    W2-INT-01:
      status: pending
      sprint: sprint-4
      petitions:
        - petition015
        - petition016
        - petition017
        - petition018
      modules:
        - opendebt-integration-gateway
        - opendebt-rules-engine
      objective: Wire fordring validation rules into integration-gateway claim ingestion.
      entry_criteria:
        - W2-RULE-04 is complete.
        - Integration-gateway Fordring endpoint exists.
      deliverables:
        - validation pipeline orchestration
        - error response transformation to fordring format
        - validation metrics and logging
        - integration tests
      depends_on:
        - W2-RULE-04
      owner_role: Backend integration engineer
      parallelization: Blocks production use of rules.

    W2-ACC-01:
      status: pending
      sprint: sprint-4
      petitions:
        - petition015
        - petition016
        - petition017
        - petition018
      modules:
        - opendebt-rules-engine
        - opendebt-integration-gateway
      objective: Make all fordring validation petition acceptance tests executable and protect with coverage.
      entry_criteria:
        - W2-INT-01 is complete.
      deliverables:
        - Cucumber acceptance coverage for all 130 scenarios
        - architecture tests for rule organization
        - rules coverage gate
        - validation pipeline smoke tests
      depends_on:
        - W2-INT-01
      owner_role: QA automation plus rules engineer
      parallelization: Final convergence ticket for Wave 2.
