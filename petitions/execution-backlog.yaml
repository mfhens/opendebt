        - ClaimantAgreementService contract definition
      depends_on:
        - W2-SPEC-01
      owner_role: Domain architect plus QA/BDD lead
      parallelization: Can run in parallel with W2-SPEC-01.

    W2-SPEC-03:
      status: done
      sprint: sprint-4
      petitions:
        - petition017
      modules:
        - petitions
        - rules-dmn
      objective: Turn petition017 into an executable engineering contract for lifecycle and reference rules.
