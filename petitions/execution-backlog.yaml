        - petition016
        - petition017
        - petition018
      modules:
        - opendebt-rules-engine
        - opendebt-integration-gateway
      objective: Make all fordring validation petition acceptance tests executable and protect with coverage.
      entry_criteria:
        - W2-INT-01 is complete.
      deliverables:
