        - NFR-API-002
        - NFR-ACC-001
        - NFR-ACC-002
        - NFR-ARCH-001
        - NFR-ARCH-002
        - NFR-ARCH-003
        - NFR-ARCH-004
  - module: integration-gateway.fogedret_attachment_boundary
    source_requirement:
      petition_refs: [FR-15, FR-16]
      outcome_contract_refs: [AC-15, AC-16, AC-17]
      gherkin_scenarios:
        - Integration-gateway is the external callback boundary
        - Callback ingress requires OCES3 mTLS at gateway
        - Callback replay is blocked at gateway
    api_contracts:
      - artifact: api-specs/openapi-integration-gateway-fogedret-attachment.yaml
        reason: OpenAPI 3.1 contract for external court dispatch/callback traffic and replay-safe ingress.
    interface:
      inputs:
        rest_endpoints:
          - method: POST
            path: /api/external/v1/fogedret/attachment-dispatch
            request:
              body_fields: [workflowReference, debtorId, coveredFordringIds]
              optional_body_fields: [externalCaseNumber]
          - method: POST
            path: /api/external/v1/fogedret/attachment-callbacks
            request:
              body_fields: [workflowReference, debtorId, callbackMessageId, callbackStatus, outcomeDate]
              optional_body_fields: [externalCaseNumber, unsuccessfulReasonCode, unsuccessfulReasonDetail]
      outputs:
        response_models:
          - name: FogedretCallbackReceipt
            fields: [accepted, replayRejected, forwardedCommandId]
      error_handling:
        - callback ingress requires successful OCES3 mTLS authentication
        - replay tuple workflowReference+outcomeDate+callbackMessageId is rejected with no downstream state change
        - gateway forwards only to internal debtor-scoped debt-service API
    non_functional:
      petition_specific:
        - id: P066-NFR-05
          description: callback ingress enforces mTLS and replay protection before internal mutation
          source: petitions/petition066-udlaeg-skaerpet-inddrivelse-psrm-workflow.md#Functional Requirements
  - module: petitions.validation_handoff
    source_requirement:
      petition_refs: [FR-14, FR-15, FR-16]
      outcome_contract_refs: [AC-14, AC-15, AC-16, AC-17]
      gherkin_scenarios:
        - Debtor-scoped read returns status history and interruption linkage
        - Integration-gateway is the external callback boundary
        - Callback ingress requires OCES3 mTLS at gateway
        - Callback replay is blocked at gateway
    notes:
      - Browser validation remains optional until a concrete caseworker route exists.
      - API-observable assertions are still required through the validation contract for phase 6.5 evidence.
performance_classification:
  mode: synchronous
  target:
    create_dispatch_read_p95_ms: 1000
    callback_apply_p95_ms: 1000
  redesign_trigger:
    description: if measured p95 exceeds 1000 ms or callback application requires async compensation, reopen architecture before closure
acceptance_trace:
  AC-01: create workflow stores REQUESTED state and unique workflowReference
  AC-02: ineligible covered claim rejects create atomically
  AC-03: accepted dispatch moves to IN_COURT_PROCESS and stores metadata
  AC-04: repeated dispatch is idempotent
  AC-05: scope mutation is rejected after REQUESTED
  AC-06: callback requires debtor scope and workflowReference match
  AC-07: COMPLETED persists terminal state and policy-derived interruption atomically
  AC-08: UNSUCCESSFUL persists terminal state and interruption atomically
  AC-09: UNSUCCESSFUL requires reason code
  AC-10: WITHDRAWN requires reason and emits no interruption
  AC-11: interruption emission occurs once per complex group or standalone claim
  AC-12: duplicate terminal callback is idempotent no-op
  AC-13: legal reference is policy-derived and not caller-overridden
  AC-14: debtor-scoped reads include status history and interruption linkage
  AC-15: integration-gateway is external callback boundary
  AC-16: callback ingress requires OCES3 mTLS at gateway
  AC-17: replay tuple is rejected at gateway
