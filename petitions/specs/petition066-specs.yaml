modules:
  - module: opendebt-debt-service.attachment_workflow
    source_requirement:
      petition_refs: [FR-01, FR-02, FR-03, FR-04, FR-05, FR-06, FR-07, FR-08, FR-09, FR-10, FR-11, FR-12, FR-13, FR-14]
      outcome_contract_refs: [AC-01, AC-02, AC-03, AC-04, AC-05, AC-06, AC-07, AC-08, AC-09, AC-10, AC-11, AC-12, AC-13, AC-14]
      gherkin_scenarios:
        - Create workflow with eligible covered claims
        - Reject creation when any covered claim is ineligible
        - Accepted dispatch moves workflow to IN_COURT_PROCESS
        - Repeated dispatch command is idempotent
        - Covered claim scope is immutable after REQUESTED
        - Callback requires both debtor scope and workflow reference match
        - Callback with mismatched workflow reference is rejected
        - COMPLETED callback persists terminal state and policy-derived interruption atomically
        - UNSUCCESSFUL callback requires reason code and registers interruption
        - UNSUCCESSFUL callback without reason code is rejected
        - WITHDRAWN requires reason and emits no interruption
        - Interruption emission occurs once per covered complex group
        - Duplicate terminal callback is idempotent no-op
        - Legal reference is policy-derived and not caller-overridden
        - Debtor-scoped read returns status history and interruption linkage
    api_contracts:
      - artifact: api-specs/openapi-debt-service-attachment-workflow-internal.yaml
        reason: OpenAPI 3.1 contract for the debtor-scoped attachment workflow commands and reads.
    interface:
      inputs:
        rest_endpoints:
          - method: POST
            path: /api/internal/v1/debtors/{debtorId}/attachment-workflows
            request:
              path_params: [debtorId]
              body_fields: [coveredFordringIds]
          - method: POST
            path: /api/internal/v1/debtors/{debtorId}/attachment-workflows/{workflowId}/dispatch
            request:
              path_params: [debtorId, workflowId]
              body: none
          - method: POST
            path: /api/internal/v1/debtors/{debtorId}/attachment-workflows/{workflowId}/withdraw
            request:
              path_params: [debtorId, workflowId]
              body_fields: [reason]
          - method: POST
            path: /api/internal/v1/debtors/{debtorId}/attachment-workflows/callbacks
            request:
              body_fields: [debtorId, workflowReference, callbackMessageId, callbackStatus, outcomeDate]
              optional_body_fields: [externalCaseNumber, unsuccessfulReasonCode, unsuccessfulReasonDetail, callerProvidedLegalReference]
          - method: GET
            path: /api/internal/v1/debtors/{debtorId}/attachment-workflows
            request:
              path_params: [debtorId]
              body: none
          - method: GET
            path: /api/internal/v1/debtors/{debtorId}/attachment-workflows/{workflowId}
            request:
              path_params: [debtorId, workflowId]
              body: none
      outputs:
        response_models:
          - name: AttachmentWorkflowDto
            fields:
              - workflowId
              - debtorId
              - coveredFordringIds
              - workflowReference
              - status
              - dispatchMetadata
              - outcomeQualifier
              - unsuccessfulReasonCode
              - unsuccessfulReasonDetail
              - withdrawalReason
              - terminalOutcomeDate
              - interruptionLinkage
              - statusHistory
          - name: AttachmentWorkflowSummaryDto
            fields:
              - workflowId
              - workflowReference
              - status
              - outcomeQualifier
              - terminalOutcomeDate
          - name: AttachmentDispatchResultDto
            fields:
              - workflowId
              - workflowReference
              - status
              - dispatchMetadata
              - idempotentReplay
      error_handling:
        - create rejects when any covered claim is ineligible and returns per-claim reasons with no workflow created
        - scope mutation after creation is rejected with instruction to withdraw and recreate
        - repeated dispatch returns existing dispatch metadata and does not create duplicate outbound dispatch
        - callback requires matching debtor scope and workflowReference; mismatch returns rejection with no state change
        - callback UNSUCCESSFUL without unsuccessfulReasonCode returns HTTP 422
        - WITHDRAWN requires non-empty reason
        - duplicate terminal callback with same terminal status is accepted as idempotent no-op and must not duplicate interruption emission
        - callerProvidedLegalReference is ignored and must not override policy-derived legal reference
    data_models:
      - name: AttachmentWorkflow
        fields:
          - workflowId
          - debtorId
          - coveredFordringIds
          - workflowReference
          - status
          - dispatchMetadata
          - outcomeQualifier
          - unsuccessfulReasonCode
          - unsuccessfulReasonDetail
          - withdrawalReason
          - terminalOutcomeDate
          - interruptionLinkage
          - statusHistory
      - name: AttachmentStatusHistoryEntry
        fields:
          - occurredAt
          - fromStatus
          - toStatus
          - source
          - note
          - idempotentReplay
      - name: AttachmentInterruptionLinkage
        fields:
          - sourceWorkflowId
          - interruptionType
          - eventDate
          - legalReference
          - emittedForFordringskompleksOrFordring
      - name: AttachmentDispatchMetadata
        fields:
          - dispatchedAt
          - workflowReference
          - externalCaseNumber
          - transportReference
    persistence:
      - attachment workflow state is stored in a dedicated debt-service aggregate and is the sole write source of truth
      - coveredFordringIds are immutable from REQUESTED onward
      - COMPLETED and UNSUCCESSFUL transitions persist terminal state and petition059 interruption linkage atomically
      - interruption emission occurs once per claim complex group or standalone claim
      - WITHDRAWN persists reason and emits no interruption
      - stored data uses technical identifiers only; no CPR, name, address, email, or phone is allowed
    non_functional:
      petition_specific:
        - id: P066-NFR-01
          description: create, dispatch, and callback handling are deterministic and idempotent under retry
          source: petitions/petition066-udlaeg-skaerpet-inddrivelse-psrm-workflow.md#Functional Requirements
        - id: P066-NFR-02
          description: terminal workflow persistence and petition059 interruption registration commit atomically
          source: petitions/petition066-udlaeg-skaerpet-inddrivelse-psrm-workflow.md#Functional Requirements
        - id: P066-NFR-03
          description: debtor-scoped attachment APIs and stored records use technical identifiers only
          source: petitions/petition066-udlaeg-skaerpet-inddrivelse-psrm-workflow.md#Constraints and Assumptions
        - id: P066-NFR-04
          description: synchronous command/read paths should meet p95 under 1 second or trigger redesign review
          source: design/solution-architecture-p066-udlaeg-psrm-workflow.md#7-nfr-alignment
      register_refs:
        - NFR-SEC-001
        - NFR-SEC-002
        - NFR-SEC-003
        - NFR-SEC-004
        - NFR-SEC-005
        - NFR-SEC-006
        - NFR-GDPR-001
        - NFR-GDPR-002
        - NFR-GDPR-003
        - NFR-GDPR-004
        - NFR-GDPR-005
        - NFR-AUDIT-001
        - NFR-RIGS-001
        - NFR-RIGS-002
        - NFR-PERF-001
        - NFR-PERF-002
        - NFR-PERF-003
        - NFR-RES-001
        - NFR-RES-002
        - NFR-RES-003
        - NFR-OBS-001
        - NFR-OBS-002
        - NFR-OBS-003
