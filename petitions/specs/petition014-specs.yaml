# Accessibility statements and feedback (petition014)

spec_id: SPEC-P014
petition: petition014
title: Accessibility statements and feedback for each UI
module: opendebt-creditor-portal, opendebt-citizen-portal, opendebt-caseworker-portal
feature_file: petitions/petition014-accessibility-statements-and-feedback.feature

functional_requirements:
  - id: FR-P014-01
    summary: Discoverable link to accessibility statement per surface
    scenarios:
      - A web UI exposes a discoverable accessibility statement

  - id: FR-P014-02
    summary: Written contact path usable without MitID; no blocking CAPTCHA
    scenarios:
      - The written contact path is accessible

  - id: FR-P014-03
    summary: Statement updated when accessibility-relevant UI changes ship
    scenarios:
      - Accessibility statement maintenance is required after relevant change
