specification_id: P026-SPECS
petition: petition026
title: Citizen debt overview page
status: success
source_artifacts:
  petition: "petitions\\petition026-citizen-debt-overview-page.md"
  outcome_contract: "petitions\\petition026-citizen-debt-overview-page-outcome-contract.md"
  feature: "petitions\\petition026-citizen-debt-overview-page.feature"
  solution_architecture: "design\\solution-architecture-026.md"
  reviews:
    - "petitions\\reviews\\petition026-specs-reviewer.yaml"
    - "petitions\\reviews\\petition026-specs-minimality-reviewer.yaml"
  nfr_register: "compliance\\nfr-register.yaml"
out_of_scope:
  - Payment processing
  - PDF generation
  - Instalment plan management
  - Objection submission
