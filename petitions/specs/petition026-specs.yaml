approved_architecture_constraints:
  - decision: The portal serves /min-gaeld as a UI/BFF and calls debt-service only for page-time data.
    source: "design\\solution-architecture-026.md:71-83, 128-140"
  - decision: debt-service returns creditorDisplayName and resolves it through creditor-service; the portal does not call creditor-service or person-registry directly.
    source: "design\\solution-architecture-026.md:15, 80-83, 146-159, 239-265"
  - decision: Numeric interest-rate metadata comes from debt-service; the portal owns localized prose only.
    source: "design\\solution-architecture-026.md:81-83, 254-265"
  - decision: The debt-type column uses Claim Type semantics, not Claim Art semantics.
    source: "design\\solution-architecture-026.md:57-63"
  - decision: /api/v1/citizen/debts must declare explicit bearerAuth semantics or a documented exception, closing GOV-026-001.
    source: "petitions\\reviews\\petition026-c4-architecture-governor.yaml:15-29"
