apiVersion: v1
kind: ServiceAccount
metadata:
  name: opendebt-service-account
  namespace: opendebt
  labels:
    app.kubernetes.io/name: opendebt
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opendebt-role
  namespace: opendebt
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opendebt-role-binding
  namespace: opendebt
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: opendebt-role
subjects:
  - kind: ServiceAccount
    name: opendebt-service-account
    namespace: opendebt
