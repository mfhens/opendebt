apiVersion: apps/v1
kind: Deployment
metadata:
  name: opendebt-case-service
  namespace: opendebt
  labels:
    app: opendebt-case-service
    app.kubernetes.io/name: opendebt-case-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: opendebt
spec:
  replicas: 2
  selector:
    matchLabels:
      app: opendebt-case-service
  template:
    metadata:
      labels:
        app: opendebt-case-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/case-service/actuator/prometheus"
    spec:
      serviceAccountName: opendebt-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: case-service
          image: opendebt/opendebt-case-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: opendebt-config
            - secretRef:
                name: opendebt-secrets
          env:
            - name: KEYCLOAK_ISSUER_URI
              valueFrom:
                configMapKeyRef:
                  name: opendebt-config
                  key: KEYCLOAK_ISSUER_URI
                  optional: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /case-service/actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /case-service/actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: opendebt-case-service
                topologyKey: kubernetes.io/hostname
