apiVersion: apps/v1
kind: Deployment
metadata:
  name: opendebt-creditor-portal
  namespace: opendebt
  labels:
    app: opendebt-creditor-portal
    app.kubernetes.io/name: opendebt-creditor-portal
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: opendebt
spec:
  replicas: 2
  selector:
    matchLabels:
      app: opendebt-creditor-portal
  template:
    metadata:
      labels:
        app: opendebt-creditor-portal
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8085"
        prometheus.io/path: "/creditor-portal/actuator/prometheus"
    spec:
      serviceAccountName: opendebt-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: creditor-portal
          image: opendebt/opendebt-creditor-portal:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8085
              protocol: TCP
          envFrom:
            - configMapRef:
                name: opendebt-config
            - secretRef:
                name: opendebt-secrets
          env:
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: opendebt-secrets
                  key: KEYCLOAK_CREDITOR_PORTAL_CLIENT_SECRET
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /creditor-portal/actuator/health/liveness
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /creditor-portal/actuator/health/readiness
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: opendebt-creditor-portal
                topologyKey: kubernetes.io/hostname
