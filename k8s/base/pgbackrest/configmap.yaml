apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbackrest-config
  namespace: opendebt
  labels:
    app: pgbackrest-backup
    app.kubernetes.io/name: pgbackrest-config
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: opendebt
data:
  pgbackrest.conf: |
    [global]
    # Object storage — values injected from pgbackrest-secrets
    repo1-type=azure
    repo1-azure-container=opendebt-pgbackrest
    repo1-azure-account=${AZURE_STORAGE_ACCOUNT}
    repo1-azure-key=${AZURE_STORAGE_KEY}

    # Encrypt backup repository at rest (passphrase from pgbackrest-secrets)
    repo1-cipher-type=aes-256-cbc
    repo1-cipher-pass=${PGBACKREST_CIPHER_PASSPHRASE}

    # Retention policy (ADR-0028)
    repo1-retention-full=4
    repo1-retention-diff=14

    # Logging
    log-level-file=info
    log-path=/tmp/pgbackrest

    [global:archive-push]
    compress-level=3

    [opendebt]
    # Primary PostgreSQL host — override in production overlay
    pg1-host=${PGBACKREST_PG_HOST}
    pg1-host-user=postgres
    pg1-path=/var/lib/postgresql/data
    pg1-port=5432
    pg1-user=postgres

    [opendebt-keycloak]
    pg1-host=${PGBACKREST_KEYCLOAK_PG_HOST}
    pg1-host-user=postgres
    pg1-path=/var/lib/postgresql/keycloak-data
    pg1-port=5432
    pg1-user=postgres
