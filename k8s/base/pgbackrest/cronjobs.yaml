apiVersion: batch/v1
kind: CronJob
metadata:
  name: pgbackrest-verify
  namespace: opendebt
  labels:
    app: pgbackrest-backup
    app.kubernetes.io/name: pgbackrest-verify
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: opendebt
spec:
  # Weekly backup integrity check — Monday 03:00 (after Sunday full backup)
  schedule: "0 2 * * 1"
  timeZone: "Europe/Copenhagen"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 4
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        metadata:
          labels:
            app: pgbackrest-backup
            backup-type: verify
        spec:
          restartPolicy: Never
          serviceAccountName: opendebt-service-account
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            fsGroup: 999
          containers:
            - name: pgbackrest
              image: pgbackrest/pgbackrest:latest
              imagePullPolicy: Always
              command:
                - pgbackrest
                - --stanza=opendebt
                - --log-level-console=info
                - verify
              envFrom:
                - secretRef:
                    name: pgbackrest-secrets
              volumeMounts:
                - name: pgbackrest-config
                  mountPath: /etc/pgbackrest
                  readOnly: true
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
          volumes:
            - name: pgbackrest-config
              configMap:
                name: pgbackrest-config
