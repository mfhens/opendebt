spring:
  application:
    name: opendebt-citizen-portal

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/opendebt}
      client:
        registration:
          tastselv:
            client-id: opendebt-citizen
            client-secret: ${TASTSELV_CLIENT_SECRET}
            scope: openid,profile
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          tastselv:
            issuer-uri: ${TASTSELV_ISSUER_URI}
            authorization-uri: ${TASTSELV_AUTH_URI}
            token-uri: ${TASTSELV_TOKEN_URI}
            user-info-uri: ${TASTSELV_USERINFO_URI}
            jwk-set-uri: ${TASTSELV_JWK_URI}

server:
  port: 8086
  servlet:
    context-path: /borger

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    dk.ufst.opendebt: INFO

opendebt:
  citizen:
    auth:
      cpr-claim-name: "dk:gov:saml:attribute:CprNumberIdentifier"
    tastselv-integration:
      enabled: true
      base-url: ${TASTSELV_BASE_URL:https://www.tastselv.skat.dk}
    external-links:
      mit-gaeldsoverblik: ${MIT_GAELDSOVERBLIK_URL:https://mitgaeldsoverblik.gaeldst.dk/}
      payment-info: ${PAYMENT_INFO_URL:https://gaeldst.dk/borger/saadan-betaler-du-din-gaeld}
      interest-rates: ${INTEREST_RATES_URL:https://gaeldst.dk/borger/betal-min-gaeld/renter-og-gebyrer}
      payment-difficulties: ${PAYMENT_DIFFICULTIES_URL:https://gaeldst.dk/borger/hvis-du-ikke-kan-betale-din-gaeld}
      debt-counselling: ${DEBT_COUNSELLING_URL:https://gaeldst.dk/borger/hvis-du-ikke-kan-betale-din-gaeld/brug-for-raadgivning-om-din-gaeld}
      creditor-list: ${CREDITOR_LIST_URL:https://gaeldst.dk/borger/om-gaeld-til-inddrivelse/se-hvem-vi-inddriver-gaeld-for}
      debt-errors: ${DEBT_ERRORS_URL:https://gaeldst.dk/borger/om-gaeld-til-inddrivelse/hvis-der-er-fejl-i-din-gaeld}
      phone-number: "70 15 73 04"
      phone-international: "+45 70 15 73 04"
  i18n:
    default-locale: da-DK
    supported-locales:
      - da-DK
      - en-GB
  services:
    person-registry:
      url: ${PERSON_REGISTRY_URL:http://localhost:8084}
    debt-service:
      url: ${DEBT_SERVICE_URL:http://localhost:8082}
    case-service:
      url: ${CASE_SERVICE_URL:http://localhost:8081}
    payment-service:
      url: ${PAYMENT_SERVICE_URL:http://localhost:8083}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        ignoreExceptions:
          - dk.ufst.opendebt.common.exception.OpenDebtException
          - org.springframework.web.client.HttpClientErrorException
          - org.springframework.web.reactive.function.client.WebClientResponseException
    instances:
      person-registry:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        ignoreExceptions:
          - dk.ufst.opendebt.common.exception.OpenDebtException
          - org.springframework.web.client.HttpClientErrorException
          - org.springframework.web.reactive.function.client.WebClientResponseException
    instances:
      person-registry:
        baseConfig: default
