<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
  <title th:text="#{error.login.title}">Login fejlede</title>
</head>
<body>
  <section layout:fragment="breadcrumb" th:text="#{error.login.breadcrumb}">Fejl</section>
  <section layout:fragment="content">
    <h1 th:text="#{error.login.heading}">Login fejlede</h1>
    <div class="skat-alert skat-alert--error" role="alert">
      <p th:text="#{error.login.message}">Der opstod en fejl under login. Proev venligst igen.</p>
    </div>
    <a th:href="@{/}" class="skat-btn skat-btn--primary" th:text="#{error.login.back}">Gaa til forsiden</a>
  </section>
</body>
</html>
