<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head>
  <title th:text="#{dashboard.title}">Dit gaeldsoverblik</title>
</head>
<body>
  <section layout:fragment="breadcrumb" th:text="#{dashboard.breadcrumb}">Overblik</section>
  <section layout:fragment="content">
    <h1 th:text="#{dashboard.heading}">Dit gaeldsoverblik</h1>
    <p th:text="#{dashboard.description}">Her kan du se dine gaeldsforhold hos Gaeldsstyrelsen.</p>
    <div class="skat-card">
      <p th:text="#{dashboard.placeholder}">Indhold under udvikling.</p>
      <form th:action="@{/logout}" method="post">
        <button type="submit" class="skat-btn skat-btn--secondary" th:text="#{dashboard.logout}">Log ud</button>
      </form>
    </div>
  </section>
</body>
</html>
