# --- FAQ ---
landing.faq.heading=Frequently asked questions

landing.faq.q1=Where can I see my total debt?
landing.faq.a1=You can see your total debt by logging in to <a href="{0}">My debt overview</a> with MitID. Here you can see all your claims, interest, and fees.

landing.faq.q2=How do I pay my debt?
landing.faq.a2=You can pay your debt in several ways. <a href="{0}">Read more about paying your debt</a>.

landing.faq.q3=How much interest do I have to pay?
landing.faq.a3=When your debt is transferred for collection, collection interest is charged. <a href="{0}">Read more about interest and fees</a>.

landing.faq.q4=What do I do if I have difficulty paying?
landing.faq.a4=If you have difficulty paying your debt, you can contact us to arrange an instalment plan. <a href="{0}">Read more about payment difficulties</a>.

landing.faq.q5=Can I get advice about my debt?
landing.faq.a5=Yes, you can get free and impartial debt advice. <a href="{0}">Read more about debt counselling</a>.

landing.faq.q6=Do I have to pay even if my debt is old?
landing.faq.a6=Debt may be subject to limitation, but the limitation period may have been interrupted. Contact us if you are unsure about your debt.

landing.faq.q7=For whom do you collect debt?
landing.faq.a7=We collect debt for a number of public authorities. <a href="{0}">See the list of creditors</a>.

