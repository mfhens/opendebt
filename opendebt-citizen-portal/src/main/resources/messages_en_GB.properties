was.intro=This statement applies to the citizen portal of OpenDebt.
was.compliance.heading=Compliance
was.compliance.text=We strive to comply with WCAG 2.1 level AA in accordance with the EU directive on the accessibility of websites and mobile applications.
was.contact.heading=Contact us
was.contact.text=If you experience accessibility issues, you can contact us by phone at <a href="tel:+4570157304">{0}</a>.
was.enforcement.heading=Complaints procedure
was.enforcement.text=If you are not satisfied with our response, you can file a complaint with the Danish Agency for Digital Government via their complaint form at was.digst.dk.

