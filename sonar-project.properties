# ──────────────────────────────────────────────────────────────────────────────
# SonarCloud supplemental configuration
# Core properties (projectKey, organization, sources) are in pom.xml.
# ──────────────────────────────────────────────────────────────────────────────

# plsql:S1192 — "Define a constant instead of duplicating this literal"
# Flyway migration and seed scripts legitimately repeat SQL string literals
# (status codes, org IDs, UUIDs) that cannot be extracted into PL/SQL constants
# without breaking the plain-SQL migration format.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=plsql:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=**/db/migration/*.sql
