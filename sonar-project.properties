# ──────────────────────────────────────────────────────────────────────────────
# SonarCloud supplemental configuration
# Core properties (projectKey, organization, sources) are in pom.xml.
# ──────────────────────────────────────────────────────────────────────────────

# ── Exclusions from all analysis ─────────────────────────────────────────────
# JAXB-generated SOAP stubs — machine-generated, must not be modified by hand.
# Excluded from all rules and duplication detection.
sonar.exclusions=\
  **/soap/skat/generated/**,\
  **/soap/oio/generated/**

# ── Copy-paste detection exclusions ──────────────────────────────────────────
# Flyway migration and seed SQL scripts share DDL and INSERT patterns by nature.
# Structural similarity in DDL and seed data is expected and unavoidable.
sonar.cpd.exclusions=\
  **/db/migration/*.sql

# ── Issue-level suppressions ──────────────────────────────────────────────────
# plsql:S1192 — SQL string literals (status codes, UUIDs) cannot be extracted
# into constants without breaking the plain-SQL Flyway migration format.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=plsql:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=**/db/migration/*.sql
