<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>immudb Ledger Viewer — OpenDebt</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 24px; }
    h1 { color: #38bdf8; margin-bottom: 4px; }
    .subtitle { color: #64748b; margin-bottom: 24px; font-size: 14px; }
    .stats { display: flex; gap: 16px; margin-bottom: 24px; }
    .stat { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 16px 24px; }
    .stat-value { font-size: 28px; font-weight: 700; color: #38bdf8; }
    .stat-label { font-size: 12px; color: #64748b; margin-top: 4px; }
    table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 8px; overflow: hidden; }
    th { background: #0f172a; color: #94a3b8; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 12px; text-align: left; }
    td { padding: 10px 12px; border-top: 1px solid #334155; font-size: 13px; font-family: monospace; }
    tr:hover td { background: #263348; }
    .debit  { color: #f87171; font-weight: 600; }
    .credit { color: #4ade80; font-weight: 600; }
    .amount { text-align: right; }
    .tx-id  { color: #94a3b8; font-size: 11px; }
    .key    { color: #64748b; font-size: 11px; }
    button  { background: #0ea5e9; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; margin-bottom: 16px; }
    button:hover { background: #38bdf8; }
    .error { background: #450a0a; border: 1px solid #b91c1c; border-radius: 6px; padding: 12px; color: #fca5a5; margin-bottom: 16px; }
    .loading { color: #64748b; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 11px; }
    .badge-a { background: #1e3a5f; color: #7dd3fc; }
    .badge-b { background: #1a3a2e; color: #86efac; }
  </style>
</head>
<body>
  <h1>🔐 immudb Financial Ledger</h1>
  <div class="subtitle">OpenDebt · TB-028 spike · KV tamper-evidence layer · <code>defaultdb</code></div>

  <div id="error" class="error" style="display:none"></div>

  <button onclick="load()">↻ Refresh</button>

  <div class="stats" id="stats" style="display:none">
    <div class="stat"><div class="stat-value" id="stat-count">-</div><div class="stat-label">KV Entries</div></div>
    <div class="stat"><div class="stat-value" id="stat-pairs">-</div><div class="stat-label">Double-Entry Pairs</div></div>
    <div class="stat"><div class="stat-value" id="stat-txns">-</div><div class="stat-label">Unique Transactions</div></div>
    <div class="stat"><div class="stat-value" id="stat-total">-</div><div class="stat-label">Total Amount (DKK)</div></div>
  </div>

  <div id="output"><span class="loading">Loading…</span></div>

  <script>
    const API = 'http://localhost:8091/api';
    let token = null;

    async function login() {
      const r = await fetch(`${API}/login`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ user: btoa('immudb'), password: btoa('immudb') })
      });
      if (!r.ok) throw new Error(`Login failed: ${r.status}`);
      const d = await r.json();
      return d.token;
    }

    async function scan(tok) {
      const r = await fetch(`${API}/db/scan`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${tok}`},
        body: JSON.stringify({ limit: 200, desc: false })
      });
      if (!r.ok) throw new Error(`Scan failed: ${r.status}`);
      return (await r.json()).entries || [];
    }

    function decode(b64) { return atob(b64); }
    function decodeJson(b64) { try { return JSON.parse(decode(b64)); } catch { return null; } }

    function fmt(n) { return Number(n).toLocaleString('da-DK', {minimumFractionDigits: 2, maximumFractionDigits: 2}); }

    async function load() {
      document.getElementById('error').style.display = 'none';
      document.getElementById('output').innerHTML = '<span class="loading">Connecting to immudb…</span>';
      try {
        token = await login();
        const entries = await scan(token);

        const rows = entries.map(e => {
          const key = decode(e.key);
          const val = decodeJson(e.value);
          return { tx: e.tx, key, val };
        }).filter(r => r.val).sort((a,b) => a.tx - b.tx);

        const txns = new Set(rows.map(r => r.val.transactionId));
        const debits = rows.filter(r => r.val.entryType === 'DEBIT');
        const total = debits.reduce((s, r) => s + Number(r.val.amount || 0), 0);

        document.getElementById('stat-count').textContent = rows.length;
        document.getElementById('stat-pairs').textContent = Math.floor(rows.length / 2);
        document.getElementById('stat-txns').textContent = txns.size;
        document.getElementById('stat-total').textContent = fmt(total);
        document.getElementById('stats').style.display = 'flex';

        const html = `<table>
          <thead><tr>
            <th>Tx#</th><th>Type</th><th>Transaction ID</th><th>Debt</th>
            <th>Account</th><th class="amount">Amount</th><th>Currency</th><th>Key (Entry UUID)</th>
          </tr></thead>
          <tbody>${rows.map(r => {
            const v = r.val;
            const isDebt_a = (v.transactionId || '').startsWith('a0');
            const badge = isDebt_a
              ? '<span class="badge badge-a">Debt A</span>'
              : '<span class="badge badge-b">Debt B</span>';
            const typeClass = v.entryType === 'DEBIT' ? 'debit' : 'credit';
            return `<tr>
              <td>${r.tx}</td>
              <td class="${typeClass}">${v.entryType}</td>
              <td class="tx-id">${(v.transactionId||'').substring(0,8)}…</td>
              <td>${badge}</td>
              <td>${v.accountCode || '-'}</td>
              <td class="amount">${fmt(v.amount)}</td>
              <td>${v.currency || 'DKK'}</td>
              <td class="key">${r.key.substring(0,12)}…</td>
            </tr>`;
          }).join('')}</tbody>
        </table>`;
        document.getElementById('output').innerHTML = html;
      } catch (e) {
        document.getElementById('error').textContent = `Error: ${e.message} — Is immudb running at localhost:8091?`;
        document.getElementById('error').style.display = 'block';
        document.getElementById('output').innerHTML = '';
      }
    }

    load();
  </script>
</body>
</html>
