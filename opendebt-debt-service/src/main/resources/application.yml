spring:
  application:
    name: opendebt-debt-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/opendebt_debt}
    username: ${DATABASE_USERNAME:opendebt}
    password: ${DATABASE_PASSWORD:opendebt}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/opendebt}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8080/realms/opendebt/protocol/openid-connect/certs}

server:
  port: 8082
  servlet:
    context-path: /debt-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,batch
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    dk.ufst.opendebt: INFO
    org.springframework.security: INFO

opendebt:
  batch:
    page-size: 1000
    restance-transition:
      cron: "0 0 2 * * *"
    interest-accrual:
      cron: "0 30 2 * * *"
    deadline-monitoring:
      cron: "0 0 3 * * *"
    limitation-warning-days: 90
  interest:
    annual-rate: 0.0575  # DEPRECATED (petition046): superseded by business_config table. Remove once petition046 is fully wired.
  debt:
    supported-debt-types: 600
    readiness-validation:
      auto-validate: true
      require-manual-approval-threshold: 100000
  services:
    case-service:
      url: ${CASE_SERVICE_URL:http://localhost:8081}
    creditor-service:
      url: ${CREDITOR_SERVICE_URL:http://localhost:8092}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        ignoreExceptions:
          - dk.ufst.opendebt.common.exception.OpenDebtException
          - org.springframework.web.client.HttpClientErrorException
          - org.springframework.web.reactive.function.client.WebClientResponseException
    instances:
      creditor-service:
        baseConfig: default
      case-service:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        ignoreExceptions:
          - dk.ufst.opendebt.common.exception.OpenDebtException
          - org.springframework.web.client.HttpClientErrorException
          - org.springframework.web.reactive.function.client.WebClientResponseException
    instances:
      creditor-service:
        baseConfig: default
      case-service:
        baseConfig: default
