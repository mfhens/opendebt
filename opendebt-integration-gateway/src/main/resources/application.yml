spring:
  application:
    name: opendebt-integration-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/opendebt}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8080/realms/opendebt/protocol/openid-connect/certs}

server:
  port: 8089
  servlet:
    context-path: /integration-gateway

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    dk.ufst.opendebt: INFO

opendebt:
  integration:
    dupla:
      enabled: true
      base-url: ${DUPLA_BASE_URL:https://dupla.ufst.dk}
      certificate-path: ${DUPLA_CERT_PATH}
      logging:
        enabled: true
        cls-endpoint: ${CLS_ENDPOINT}
    cpr-register:
      enabled: true
      endpoint: ${CPR_ENDPOINT}
    cvr-register:
      enabled: true
      endpoint: ${CVR_ENDPOINT}
    digital-post:
      enabled: true
      endpoint: ${DIGITAL_POST_ENDPOINT}
  skb:
    enabled: true
    cremul:
      input-directory: ${SKB_CREMUL_INPUT_DIR:/var/opendebt/skb/cremul/input}
      processed-directory: ${SKB_CREMUL_PROCESSED_DIR:/var/opendebt/skb/cremul/processed}
      error-directory: ${SKB_CREMUL_ERROR_DIR:/var/opendebt/skb/cremul/error}
      poll-interval: ${SKB_CREMUL_POLL_INTERVAL:60000}
    debmul:
      output-directory: ${SKB_DEBMUL_OUTPUT_DIR:/var/opendebt/skb/debmul/output}
  services:
    debt-service:
      url: ${DEBT_SERVICE_URL:http://localhost:8082}
    creditor-service:
      url: ${CREDITOR_SERVICE_URL:http://localhost:8092}
    case-service:
      url: ${CASE_SERVICE_URL:http://localhost:8081}
    payment-service:
      url: ${PAYMENT_SERVICE_URL:http://localhost:8083}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        ignoreExceptions:
          - dk.ufst.opendebt.common.exception.OpenDebtException
          - org.springframework.web.client.HttpClientErrorException
          - org.springframework.web.reactive.function.client.WebClientResponseException
    instances:
      debt-service-write:
        baseConfig: default
      creditor-service:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        ignoreExceptions:
          - dk.ufst.opendebt.common.exception.OpenDebtException
          - org.springframework.web.client.HttpClientErrorException
          - org.springframework.web.reactive.function.client.WebClientResponseException
    instances:
      creditor-service:
        baseConfig: default
