spring:
  application:
    name: opendebt-letter-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/opendebt_letter}
    username: ${DATABASE_USERNAME:opendebt}
    password: ${DATABASE_PASSWORD:opendebt}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/opendebt}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8080/realms/opendebt/protocol/openid-connect/certs}

server:
  port: 8084
  servlet:
    context-path: /letter-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    dk.ufst.opendebt: INFO

opendebt:
  letter:
    template-location: classpath:templates/
    default-delivery-channel: DIGITAL_POST
    digital-post:
      enabled: true
      endpoint: ${DIGITAL_POST_ENDPOINT}
      sender-cvr: ${SENDER_CVR}
    e-boks:
      enabled: true
      endpoint: ${EBOKS_ENDPOINT}
    batch-processing:
      enabled: true
      schedule: "0 0 6 * * ?"
      batch-size: 500
  services:
    case-service:
      url: ${CASE_SERVICE_URL:http://localhost:8081}
