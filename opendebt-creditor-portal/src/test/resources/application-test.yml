spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/opendebt
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
    mode: HTML

opendebt:
  portal:
    links:
      agreement-material: https://gaeldst.dk/fordringshaver/individuelle-aftaler
      contact: https://www.gaeldst.dk/fordringshaver/fordringshaversupport/
      guides: https://www.gaeldst.dk/fordringshaver/find-vejledninger/guides-til-fordringshaverportalen/
  i18n:
    default-locale: da-DK
    supported-locales:
      - da-DK
      - en-GB
      - uk-UA
  services:
    debt-service:
      url: http://localhost:8082
    case-service:
      url: http://localhost:8081
    creditor-service:
      url: http://localhost:8092
    person-registry:
      url: http://localhost:8083
    reporting-service:
      url: http://localhost:8094
