spring:
  application:
    name: opendebt-creditor-portal

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
    mode: HTML

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/opendebt}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8080/realms/opendebt/protocol/openid-connect/certs}
      client:
        registration:
          keycloak:
            client-id: opendebt-creditor-portal
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            scope: openid,profile,email
            authorization-grant-type: authorization_code
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/opendebt}

server:
  port: 8085
  servlet:
    context-path: /creditor-portal

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    dk.ufst.opendebt: INFO

opendebt:
  i18n:
    default-locale: da-DK
    supported-locales:
      - da-DK
      - en-GB
      - uk-UA
      - sjn
  creditor:
    max-batch-size: 1000
    allowed-debt-types-file: classpath:debt-types.json
  portal:
    links:
      agreement-material: ${PORTAL_LINK_AGREEMENT_MATERIAL:https://gaeldst.dk/fordringshaver/individuelle-aftaler}
      contact: ${PORTAL_LINK_CONTACT:https://www.gaeldst.dk/fordringshaver/fordringshaversupport/}
      guides: ${PORTAL_LINK_GUIDES:https://www.gaeldst.dk/fordringshaver/find-vejledninger/guides-til-fordringshaverportalen/}
    rejected-claims:
      show-debtor-details: ${PORTAL_REJECTED_SHOW_DEBTOR_DETAILS:true}
  services:
    debt-service:
      url: ${DEBT_SERVICE_URL:http://localhost:8082}
    case-service:
      url: ${CASE_SERVICE_URL:http://localhost:8081}
    creditor-service:
      url: ${CREDITOR_SERVICE_URL:http://localhost:8092}
    person-registry:
      url: ${PERSON_REGISTRY_URL:http://localhost:8090}
    reporting-service:
      url: ${REPORTING_SERVICE_URL:http://localhost:8094}
    payment-service:
      url: ${PAYMENT_SERVICE_URL:http://localhost:8083}
  timeline:
    visibility:
      role-categories:
        CREDITOR: FINANCIAL,DEBT_LIFECYCLE,COLLECTION

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        ignoreExceptions:
          - dk.ufst.opendebt.common.exception.OpenDebtException
          - org.springframework.web.client.HttpClientErrorException
          - org.springframework.web.reactive.function.client.WebClientResponseException
    instances:
      debt-service-read:
        baseConfig: default
      case-service:
        baseConfig: default
      creditor-service:
        baseConfig: default
      person-registry:
        baseConfig: default
      notification-service:
        baseConfig: default
      payment-service:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        ignoreExceptions:
          - dk.ufst.opendebt.common.exception.OpenDebtException
          - org.springframework.web.client.HttpClientErrorException
          - org.springframework.web.reactive.function.client.WebClientResponseException
    instances:
      debt-service-read:
        baseConfig: default
      case-service:
        baseConfig: default
      creditor-service:
        baseConfig: default
      person-registry:
        baseConfig: default
      payment-service:
        baseConfig: default
