spring:
  application:
    name: opendebt-creditor-portal

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/opendebt}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8080/realms/opendebt/protocol/openid-connect/certs}
      client:
        registration:
          keycloak:
            client-id: opendebt-creditor-portal
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            scope: openid,profile,email
            authorization-grant-type: authorization_code
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/opendebt}

server:
  port: 8085
  servlet:
    context-path: /creditor-portal

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    dk.ufst.opendebt: INFO

opendebt:
  creditor:
    max-batch-size: 1000
    allowed-debt-types-file: classpath:debt-types.json
  services:
    debt-service:
      url: ${DEBT_SERVICE_URL:http://localhost:8082}
    case-service:
      url: ${CASE_SERVICE_URL:http://localhost:8081}
