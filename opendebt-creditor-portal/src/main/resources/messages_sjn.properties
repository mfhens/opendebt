# =============================================================================
# OpenDebt Fordringshaverportal — Sindarin (sjn) message bundle
# Tolkien Elvish (Sindarin) translation of the creditor portal.
# Uses attested Sindarin vocabulary where possible; domain-specific
# terms are constructed from Sindarin roots following Tolkien's phonology.
#
# BEGREBSMODEL GLOSSARY (docs/begrebsmodel/ is master)
# Canonical mapping from begrebsmodel v3 section 2.1:
#
#   Fordringshaver  (Creditor)              -> Echedir    (one who demands)
#   Skyldner        (Debtor)                -> Danborthon (one who owes back)
#   Fordring        (Claim)                 -> Echadad    (a demand)
#   Fordringer      (Claims, plural)        -> Echedaid
#   Restance        (Overdue Claim)         -> Echadad Gwannen (passed claim)
#   Hovedstol       (Principal)             -> Orchal     (high/chief amount)
#   Fordringstype   (Claim Type)            -> Certh Echadad (rune/mark of claim)
#   Fordringsart    (Claim Art)             -> Gened Echadad (kind of claim)
#   Betalingsfrist  (Payment Deadline)      -> Aur Nedean (day of reckoning)
#   Foraeldelse     (Limitation)            -> Ingolodh   (expiry of force)
#   Sag             (Case)                  -> Naust      (matter/affair)
#   Sager           (Cases, plural)         -> Naist
#   Inddrivelse     (Debt Collection)       -> Gothad     (gathering)
#   Overdragelse    (Transfer)              -> Danwedh    (handover/transfer)
#   Modregning      (Set-off)               -> Penngothad (counter-gathering)
#   Loenindeholdelse(Wage Garnishment)      -> Maeth Thalion (pay withholding)
#   Underretning    (Notification)          -> Siniath    (tidings)
#   Indsigelse      (Objection)             -> Dadbedh    (counter-speech)
#   Haeftelse       (Liability)             -> Gwaedh     (bond/binding)
#   Inddrivelsesskridt (Collection Measure) -> Rath Gothad (step of collection)
#   Afdragsordning  (Instalment Arrangement)-> Gwedh Aderthad (agreement of instalments)
#   Portal          (Portal)                -> Annon      (great gate)
#   Status          (Status)                -> Sad        (state/condition)
# =============================================================================

