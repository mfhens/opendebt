<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}"
      lang="da">
<head>
  <title>Dine sager</title>
</head>
<body>
  <span layout:fragment="breadcrumb">Sager</span>
  <section layout:fragment="content">
    <h1>Dine sager</h1>
    <div class="skat-card">
      <div class="skat-card__body">
        <table class="skat-table">
          <thead>
            <tr>
              <th scope="col">Sagsnummer</th>
              <th scope="col">Skyldner</th>
              <th scope="col">Samlet gæld</th>
              <th scope="col">Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="4">Ingen sager fundet. Denne side er under udvikling.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <p>
      <a class="skat-btn skat-btn--secondary" th:href="@{/}">Tilbage til forsiden</a>
    </p>
  </section>
</body>
</html>
