<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}"
      th:lang="${#locale.language}" lang="da">
<head>
  <title th:text="#{error.page.title}">Fejl</title>
</head>
<body>
  <span layout:fragment="breadcrumb" th:text="#{error.breadcrumb}">Fejl</span>
  <section layout:fragment="content">
    <h1 th:text="#{error.heading}">Der opstod en fejl</h1>
    <div class="skat-alert skat-alert--error" role="alert">
      <p th:if="${error != null}" th:text="${error}">Fejl</p>
      <p th:if="${error == null}" th:text="#{error.default.message}">En uventet fejl opstod.</p>
    </div>
    <p>
      <a class="skat-btn skat-btn--primary" th:href="@{/}" th:text="#{error.btn.back}">Tilbage til forsiden</a>
    </p>
  </section>
</body>
</html>
