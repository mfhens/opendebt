<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}"
      th:lang="${#locale.language}">
<head>
  <title th:text="#{debts.page.title}">Dine fordringer</title>
</head>
<body>
  <span layout:fragment="breadcrumb" th:text="#{debts.breadcrumb}">Fordringer</span>
  <section layout:fragment="content">
    <h1 th:text="#{debts.heading}">Dine fordringer</h1>

    <!-- Success flash message from fordring submission -->
    <div th:if="${successMessage != null}"
         class="skat-alert skat-alert--success" role="status">
      <p><span class="ikon ikon-ok" aria-hidden="true"></span> <span th:text="${successMessage}">Fordringen er indsendt.</span></p>
    </div>

    <div class="skat-card">
      <div class="skat-card__body">
        <table class="skat-table">
          <thead>
            <tr>
              <th scope="col" th:text="#{debts.col.type}">Type</th>
              <th scope="col" th:text="#{debts.col.principal}">Hovedstol</th>
              <th scope="col" th:text="#{debts.col.outstanding}">Udestående</th>
              <th scope="col" th:text="#{debts.col.dueDate}">Forfaldsdato</th>
              <th scope="col" th:text="#{debts.col.status}">Status</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${#lists.isEmpty(debts)}">
              <td colspan="5" th:text="#{debts.empty}">Ingen fordringer fundet.</td>
            </tr>
            <tr th:each="debt : ${debts}">
              <td th:text="${debt.debtTypeCode}">SKAT</td>
              <td th:text="${#numbers.formatDecimal(debt.principalAmount, 1, 'COMMA', 2, 'POINT')} + ' ' + #{debts.currency.suffix}">0,00 DKK</td>
              <td th:text="${debt.outstandingBalance != null} ? (${#numbers.formatDecimal(debt.outstandingBalance, 1, 'COMMA', 2, 'POINT')} + ' ' + #{debts.currency.suffix}) : '-'">0,00 DKK</td>
              <td th:text="${debt.dueDate}">2025-01-01</td>
              <td>
                <span th:text="${debt.status}"
                      th:classappend="${debt.status == 'PAID'} ? ' skat-badge--success' : (${debt.status == 'DISPUTED' or debt.status == 'CANCELLED'} ? ' skat-badge--error' : ' skat-badge--warning')"
                      class="skat-badge">
                  STATUS
                </span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <p style="margin-top: 1rem;">
      <a class="skat-btn skat-btn--primary" th:href="@{/fordring/ny}"><span class="ikon ikon-tilfoej" aria-hidden="true"></span> <span th:text="#{debts.btn.create}">Opret ny fordring</span></a>
      <a class="skat-btn skat-btn--secondary" th:href="@{/}"><span class="ikon ikon-arrow-right" aria-hidden="true"></span> <span th:text="#{debts.btn.back}">Tilbage til forsiden</span></a>
    </p>
  </section>
</body>
</html>
