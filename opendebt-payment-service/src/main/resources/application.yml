spring:
  application:
    name: opendebt-payment-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/opendebt_payment}
    username: ${DATABASE_USERNAME:opendebt}
    password: ${DATABASE_PASSWORD:opendebt}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/opendebt}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8080/realms/opendebt/protocol/openid-connect/certs}

server:
  port: 8083
  servlet:
    context-path: /payment-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    dk.ufst.opendebt: INFO

opendebt:
  payment:
    payment-providers:
      - name: nets
        enabled: true
      - name: bank-transfer
        enabled: true
    reconciliation:
      schedule: "0 0 2 * * ?"
  bookkeeping:
    enabled: true
  services:
    debt-service:
      url: ${DEBT_SERVICE_URL:http://localhost:8082}
    case-service:
      url: ${CASE_SERVICE_URL:http://localhost:8081}
    integration-gateway:
      url: ${INTEGRATION_GATEWAY_URL:http://localhost:8089}
