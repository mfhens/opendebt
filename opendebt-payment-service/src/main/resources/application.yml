spring:
  application:
    name: opendebt-payment-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/opendebt_payment}
    username: ${DATABASE_USERNAME:opendebt}
    password: ${DATABASE_PASSWORD:opendebt}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/opendebt}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8080/realms/opendebt/protocol/openid-connect/certs}

server:
  port: 8083
  servlet:
    context-path: /payment-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    dk.ufst.opendebt: INFO

opendebt:
  payment:
    payment-providers:
      - name: nets
        enabled: true
      - name: bank-transfer
        enabled: true
    reconciliation:
      schedule: "0 0 2 * * ?"
  bookkeeping:
    enabled: true
    crossing:
      max-lookback-months: 12
  interest:
    annual-rate: 0.0575
  # immudb tamper-evidence layer (ADR-0029, TB-028)
  # Disabled by default — no immudb connection is required for normal operation or tests.
  # Enable when running with docker-compose (see immudb service) or on the target platform.
  immudb:
    enabled: false
    host: ${OPENDEBT_IMMUDB_HOST:localhost}
    port: ${OPENDEBT_IMMUDB_PORT:3322}
    username: ${OPENDEBT_IMMUDB_USERNAME:immudb}
    password: ${OPENDEBT_IMMUDB_PASSWORD:immudb}
    database: ${OPENDEBT_IMMUDB_DATABASE:defaultdb}
  services:
    debt-service:
      url: ${DEBT_SERVICE_URL:http://localhost:8082}
    case-service:
      url: ${CASE_SERVICE_URL:http://localhost:8081}
    integration-gateway:
      url: ${INTEGRATION_GATEWAY_URL:http://localhost:8089}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        ignoreExceptions:
          - dk.ufst.opendebt.common.exception.OpenDebtException
          - org.springframework.web.client.HttpClientErrorException
          - org.springframework.web.reactive.function.client.WebClientResponseException
    instances:
      debt-service-read:
        baseConfig: default
      debt-service-write:
        baseConfig: default
      case-service:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        ignoreExceptions:
          - dk.ufst.opendebt.common.exception.OpenDebtException
          - org.springframework.web.client.HttpClientErrorException
          - org.springframework.web.reactive.function.client.WebClientResponseException
    instances:
      debt-service-read:
        baseConfig: default
      case-service:
        baseConfig: default
