# OWASP Dependency-Check is slow (~30m) due to NVD data; it runs on a schedule instead of every push.
# Run manually: Actions → "OWASP Dependency Check" → Run workflow.

name: OWASP Dependency Check

on:
  schedule:
    # Weekly Monday 06:00 UTC (aligned with Dependabot weekly cadence)
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: owasp-dependency-check
  cancel-in-progress: false

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: '-Xmx1024m'

jobs:
  owasp:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Install local modules
        run: mvn install -DskipTests -B -q

      - name: OWASP Dependency Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mvn org.owasp:dependency-check-maven:check -P security-scan -B \
            -DnvdApiKey="$NVD_API_KEY" \
            -DnvdApiDelay=4000

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: '**/target/dependency-check-report.html'
