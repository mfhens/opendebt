name: OpenDebt CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

env:
  JAVA_VERSION: '21'
  # Retry Maven Central downloads (mitigates transient "Connection reset" on large artifacts, e.g. smooks-core in integration-gateway).
  MAVEN_OPTS: >-
    -Xmx1024m
    -Dmaven.wagon.http.retryHandler.count=5
    -Dmaven.wagon.http.retryHandler.requestSentEnabled=true

jobs:
  validate:
    name: Validate & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Check code formatting (Spotless)
        run: mvn spotless:check -B

      - name: Validate Maven project
        run: mvn validate -B

      - name: Validate C4 architecture model
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/architecture:/usr/local/structurizr \
            structurizr/cli validate --workspace workspace.dsl

  catala-tests:
    name: Catala Compliance Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "4.14.2"

      - name: Install Catala 1.1.0
        run: opam install catala.1.1.0 -y

      - name: Typecheck Catala compliance files
        # catala typecheck accepts exactly one file per invocation.
        # --language en: .catala_da extension is not a recognized language variant;
        #   all files use English surface syntax.
        # --no-stdlib: the files use only built-in Catala types (boolean, date, integer);
        #   the English standard library (Stdlib_en) is not part of the default opam install path
        #   and is not needed here.
        run: |
          eval $(opam env)
          # Source files (each includes only itself)
          catala typecheck --language en --no-stdlib catala/ga_1_3_4_1_3_5_suspension_tilbagekaldelse.catala_da
          catala typecheck --language en --no-stdlib catala/ga_1_4_2_1_4_5_ikkeinddrivelsesparate_ophoer.catala_da
          catala typecheck --language en --no-stdlib catala/ga_1_4_3_opskrivning.catala_da
          catala typecheck --language en --no-stdlib catala/ga_1_4_4_nedskrivning.catala_da
          catala typecheck --language en --no-stdlib catala/ga_2_3_2_1_daekningsraekkefoeigen.catala_da
          catala typecheck --language en --no-stdlib catala/ga_2_3_3_2_3_4_modregning_korrektionspulje.catala_da
          catala typecheck --language en --no-stdlib catala/ga_2_4_foraeldelse.catala_da
          catala typecheck --language en --no-stdlib catala/ga_2_5_retskraftvurdering.catala_da
          catala typecheck --language en --no-stdlib catala/ga_3_1_1_afdragsordninger.catala_da
          catala typecheck --language en --no-stdlib catala/ga_3_1_2_loenindeholdelse_pct.catala_da
          # Test files (each uses "> Include:" to pull in its source file)
          catala typecheck --language en --no-stdlib catala/tests/ga_afdragsordninger_tests.catala_da
          catala typecheck --language en --no-stdlib catala/tests/ga_daekningsraekkefoeigen_tests.catala_da
          catala typecheck --language en --no-stdlib catala/tests/ga_foraeldelse_tests.catala_da
          catala typecheck --language en --no-stdlib catala/tests/ga_ikkeinddrivelsesparate_ophoer_tests.catala_da
          catala typecheck --language en --no-stdlib catala/tests/ga_loenindeholdelse_tests.catala_da
          catala typecheck --language en --no-stdlib catala/tests/ga_modregning_korrektionspulje_tests.catala_da
          catala typecheck --language en --no-stdlib catala/tests/ga_opskrivning_nedskrivning_tests.catala_da
          catala typecheck --language en --no-stdlib catala/tests/ga_retskraftvurdering_tests.catala_da
          catala typecheck --language en --no-stdlib catala/tests/ga_suspension_tilbagekaldelse_tests.catala_da

      - name: Run Catala compliance assertions
        run: |
          eval $(opam env)
          # Suspension/Tilbagekaldelse tests (6 scopes — P055 G.A.1.3.4–1.3.5)
          for scope in SuspensionTest1 SuspensionTest2 SuspensionTest3 SuspensionTest4 \
                       TilbagekaldTest5 TilbagekaldTest6; do
            catala interpret --language en --no-stdlib --scope "$scope" \
              catala/tests/ga_suspension_tilbagekaldelse_tests.catala_da
          done
          # Ikkeinddrivelsesparate + Ophør tests (10 scopes — P056 G.A.1.4.2, G.A.1.4.5)
          for scope in IkkeinddrivelsesparatTest1 IkkeinddrivelsesparatTest2 IkkeinddrivelsesparatTest3 \
                       IkkeinddrivelsesparatTest4 IkkeinddrivelsesparatTest5 IkkeinddrivelsesparatTest6 \
                       OphoerTest7 OphoerTest8 OphoerTest9 OphoerTest10; do
            catala interpret --language en --no-stdlib --scope "$scope" \
              catala/tests/ga_ikkeinddrivelsesparate_ophoer_tests.catala_da
          done
          # Opskrivning/Nedskrivning tests (10 scopes — NedskrivningTest11 excluded: negative test)
          for scope in OpskrivningTest1 OpskrivningTest2 OpskrivningTest3 OpskrivningTest4 \
                       NedskrivningTest5 NedskrivningTest6 NedskrivningTest7 NedskrivningTest8 \
                       NedskrivningTest9 NedskrivningTest10; do
            catala interpret --language en --no-stdlib --scope "$scope" \
              catala/tests/ga_opskrivning_nedskrivning_tests.catala_da
          done
          # Forældelse tests (18 scopes)
          for scope in ForaeldelseTest01 ForaeldelseTest02 ForaeldelseTest03 \
                       ForaeldelseTest04 ForaeldelseTest05 ForaeldelseTest06 \
                       ForaeldelseTest07a ForaeldelseTest07b \
                       ForaeldelseTest08 ForaeldelseTest09 ForaeldelseTest10 \
                       ForaeldelseTest11a ForaeldelseTest11b \
                       ForaeldelseTest12 ForaeldelseTest13 ForaeldelseTest14 \
                       ForaeldelseTest15 ForaeldelseTest16; do
            catala interpret --language en --no-stdlib --scope "$scope" \
              catala/tests/ga_foraeldelse_tests.catala_da
          done
          # Dækningsrækkefølge tests (16 scopes)
          for scope in DaekningTest1 DaekningTest2 DaekningTest3 DaekningTest11 \
                       DaekningTest4 DaekningTest5 \
                       DaekningTest6a DaekningTest6b DaekningTest6c \
                       DaekningTest6d DaekningTest6e DaekningTest6f \
                       DaekningTest7 DaekningTest8 DaekningTest9 DaekningTest10; do
            catala interpret --language en --no-stdlib --scope "$scope" \
              catala/tests/ga_daekningsraekkefoeigen_tests.catala_da
          done
          # Retskraftvurdering tests (16 scopes — P060 G.A.2.5)
          for scope in RetskraftTest01 RetskraftTest02 RetskraftTest03 \
                       RetskraftTest04 RetskraftTest05 RetskraftTest06 \
                       RetskraftTest07 RetskraftTest08 RetskraftTest09 RetskraftTest10 \
                       RetskraftTest11 RetskraftTest12 RetskraftTest13 RetskraftTest14 \
                       RetskraftTest15 RetskraftTest16; do
            catala interpret --language en --no-stdlib --scope "$scope" \
              catala/tests/ga_retskraftvurdering_tests.catala_da
          done
          # Modregning + Korrektionspulje tests (18 scopes — P058 G.A.2.3.3–2.3.4)
          for scope in ModregningTest1 ModregningTest2 ModregningTest3 ModregningTest4 \
                       ModregningTest5 ModregningTest6 ModregningTest7 ModregningTest8 \
                       ModregningTest9 ModregningTest10 \
                       ModregningTest11 ModregningTest12 ModregningTest13 \
                       ModregningTest14 ModregningTest15 ModregningTest16 \
                       ModregningTest17 ModregningTest18; do
            catala interpret --language en --no-stdlib --scope "$scope" \
              catala/tests/ga_modregning_korrektionspulje_tests.catala_da
          done
          # Lønindeholdelsesprocent tests (10 scopes — P072 G.A.3.1.2.5)
          for scope in LoenindeholdelseTest1 LoenindeholdelseTest2 LoenindeholdelseTest3 \
                       LoenindeholdelseTest4 LoenindeholdelseTest5 LoenindeholdelseTest6 \
                       LoenindeholdelseTest7a LoenindeholdelseTest7b \
                       LoenindeholdelseTest8 LoenindeholdelseTest9; do
            catala interpret --language en --no-stdlib --scope "$scope" \
              catala/tests/ga_loenindeholdelse_tests.catala_da
          done

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48

  build:
    name: Build & Test
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean install -B -DskipTests

      - name: Run unit tests
        run: mvn test -B

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/target/surefire-reports/'

  code-quality:
    name: Code Quality Analysis
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run tests with coverage
        run: mvn clean verify -B

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: '**/target/site/jacoco/'

      - name: SonarCloud Analysis
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN

  integration-tests:
    name: Integration Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Start Keycloak
        run: |
          docker run -d --name keycloak \
            -p 8080:8080 \
            -e KEYCLOAK_ADMIN=admin \
            -e KEYCLOAK_ADMIN_PASSWORD=admin \
            -e KC_HEALTH_ENABLED=true \
            quay.io/keycloak/keycloak:24.0 start-dev

      - name: Wait for Keycloak
        run: |
          echo "Waiting for Keycloak to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health/ready > /dev/null 2>&1; then
              echo "Keycloak is ready"
              exit 0
            fi
            echo "Attempt $i/30 - waiting 5s..."
            sleep 5
          done
          echo "Keycloak failed to start"
          docker logs keycloak
          exit 1

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run integration tests
        run: mvn verify -P integration-tests -B
        env:
          KEYCLOAK_ISSUER_URI: http://localhost:8080/realms/opendebt

      - name: Stop Keycloak
        if: always()
        run: docker stop keycloak && docker rm keycloak

  e2e-tests:
    name: E2E Acceptance Tests (Playwright)
    needs: build
    runs-on: ubuntu-latest
    # Only run on main/develop — requires a full running stack
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: '22'

      - name: Build application JARs
        run: mvn clean package -B -DskipTests

      - name: Start full stack
        run: docker compose up -d

      - name: Wait for portals and core backend services
        run: |
          # Paths must match server.servlet.context-path (actuator is behind context path).
          # debt-service POST /debts/submit calls creditor-service validate-action — if creditor-service
          # is not up yet, the wizard gets HTTP 503 from debt-service and E2E fails (FR-P012-02b).
          for url in \
            "http://localhost:8082/debt-service/actuator/health" \
            "http://localhost:8092/creditor-service/actuator/health" \
            "http://localhost:8085/creditor-portal/actuator/health" \
            "http://localhost:8086/borger/actuator/health" \
            "http://localhost:8087/caseworker-portal/actuator/health"; do
            ready=0
            for i in $(seq 1 30); do
              if curl -sf "$url" > /dev/null 2>&1; then
                echo "$url is ready"
                ready=1
                break
              fi
              echo "Waiting for $url (attempt $i/30)..."
              sleep 5
            done
            if [ "$ready" != "1" ]; then
              echo "::error::Timeout waiting for $url"
              exit 1
            fi
          done

      # Spring OAuth redirects use http://keycloak:8080 — that hostname exists only on the Docker
      # network. Map it on the runner so Playwright can complete the browser login flow.
      - name: Map Keycloak hostname for Playwright OAuth
        run: echo '127.0.0.1 keycloak' | sudo tee -a /etc/hosts

      - name: Install Playwright dependencies
        working-directory: opendebt-e2e
        run: npm ci && npx playwright install --with-deps chromium

      - name: Typecheck Playwright project
        working-directory: opendebt-e2e
        run: npm run typecheck

      - name: Run E2E tests
        working-directory: opendebt-e2e
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: opendebt-e2e/playwright-report/
          retention-days: 30

      - name: Stop stack
        if: always()
        run: docker compose down -v
