services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: opendebt
      POSTGRES_PASSWORD: opendebt
      POSTGRES_MULTIPLE_DATABASES: opendebt_person,opendebt_case,opendebt_debt,opendebt_creditor,opendebt_payment,opendebt_letter,opendebt_offsetting,opendebt_wage_garnishment
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opendebt"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm --health-enabled=true
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./config/keycloak:/opt/keycloak/data/import
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/8080' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  person-registry:
    build: ./opendebt-person-registry
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: local
      DATABASE_URL: jdbc:postgresql://postgres:5432/opendebt_person
      DATABASE_USERNAME: opendebt
      DATABASE_PASSWORD: opendebt
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/opendebt
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY=}
      DEMO_SEED_ORGANIZATIONS: "true"
      DEMO_SEED_PERSONS: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy

  case-service:
    build: ./opendebt-case-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: local
      DATABASE_URL: jdbc:postgresql://postgres:5432/opendebt_case
      DATABASE_USERNAME: opendebt
      DATABASE_PASSWORD: opendebt
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/opendebt
      KEYCLOAK_JWK_URI: http://keycloak:8080/realms/opendebt/protocol/openid-connect/certs
      PERSON_REGISTRY_URL: http://person-registry:8090
      DEBT_SERVICE_URL: http://debt-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8083
      LETTER_SERVICE_URL: http://letter-service:8084
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy
      person-registry:
        condition: service_started

  debt-service:
    build: ./opendebt-debt-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: local
      DATABASE_URL: jdbc:postgresql://postgres:5432/opendebt_debt
      DATABASE_USERNAME: opendebt
      DATABASE_PASSWORD: opendebt
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/opendebt
      PERSON_REGISTRY_URL: http://person-registry:8090
      CASE_SERVICE_URL: http://case-service:8081
      CREDITOR_SERVICE_URL: http://creditor-service:8092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy
      person-registry:
        condition: service_started
      creditor-service:
        condition: service_started

  payment-service:
    build: ./opendebt-payment-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: local
      DATABASE_URL: jdbc:postgresql://postgres:5432/opendebt_payment
      DATABASE_USERNAME: opendebt
      DATABASE_PASSWORD: opendebt
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/opendebt
      DEBT_SERVICE_URL: http://debt-service:8082
      CASE_SERVICE_URL: http://case-service:8081
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OPENDEBT_IMMUDB_ENABLED: "true"
      OPENDEBT_IMMUDB_HOST: immudb
      # Disable native epoll to prevent SIGSEGV in the gRPC/Netty shaded native library
      JAVA_TOOL_OPTIONS: "-Dio.grpc.netty.shaded.io.netty.transport.noNative=true"
    depends_on:
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy
      immudb:
        condition: service_healthy

  letter-service:
    build: ./opendebt-letter-service
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: local
      DATABASE_URL: jdbc:postgresql://postgres:5432/opendebt_letter
      DATABASE_USERNAME: opendebt
      DATABASE_PASSWORD: opendebt
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/opendebt
      CASE_SERVICE_URL: http://case-service:8081
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy

  creditor-service:
    build: ./opendebt-creditor-service
    ports:
      - "8092:8092"
    environment:
      SPRING_PROFILES_ACTIVE: local
      DATABASE_URL: jdbc:postgresql://postgres:5432/opendebt_creditor
      DATABASE_USERNAME: opendebt
      DATABASE_PASSWORD: opendebt
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/opendebt
      PERSON_REGISTRY_URL: http://person-registry:8090
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy
      person-registry:
        condition: service_started

  # immudb tamper-evidence layer (ADR-0029, TB-028 spike)
  # AIDEV-NOTE: Disabled by default in payment-service (opendebt.immudb.enabled=false).
  # Enable by setting OPENDEBT_IMMUDB_ENABLED=true in the payment-service environment block
  # and configuring the connection properties below.
  immudb:
    image: codenotary/immudb:latest
    command: ["--web-server"]
    ports:
      - "3322:3322"   # gRPC API
      - "8094:8080"   # REST / web console (http://localhost:8094) — 8091 reserved for rules-engine
      - "9497:9497"   # Prometheus metrics
    volumes:
      - immudb_data:/var/lib/immudb
    healthcheck:
      test: ["CMD", "immuadmin", "status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  creditor-portal:
    build: ./opendebt-creditor-portal
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: local
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/opendebt
      KEYCLOAK_CLIENT_SECRET: creditor-portal-dev-secret
      DEBT_SERVICE_URL: http://debt-service:8082
      CASE_SERVICE_URL: http://case-service:8081
      CREDITOR_SERVICE_URL: http://creditor-service:8092
      PAYMENT_SERVICE_URL: http://payment-service:8083
      # Wizard step 1 CPR/CVR verification — must use Docker service hostname, not localhost
      PERSON_REGISTRY_URL: http://person-registry:8090
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      keycloak:
        condition: service_healthy
      creditor-service:
        condition: service_started
      person-registry:
        condition: service_started

  caseworker-portal:
    build: ./opendebt-caseworker-portal
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: local
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/opendebt
      KEYCLOAK_CLIENT_SECRET: caseworker-portal-dev-secret
      CASE_SERVICE_URL: http://case-service:8081
      DEBT_SERVICE_URL: http://debt-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8083
      PERSON_REGISTRY_URL: http://person-registry:8090
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      keycloak:
        condition: service_healthy
      case-service:
        condition: service_started

  citizen-portal:
    build: ./opendebt-citizen-portal
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: local
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/opendebt
      DEBT_SERVICE_URL: http://debt-service:8082
      CASE_SERVICE_URL: http://case-service:8081
      PAYMENT_SERVICE_URL: http://payment-service:8083
      PERSON_REGISTRY_URL: http://person-registry:8090
      # TastSelv (MitID/NemID citizen login) — pointed to Keycloak for local demo.
      # Replace with real TastSelv endpoints for production.
      TASTSELV_ISSUER_URI: http://keycloak:8080/realms/opendebt
      TASTSELV_AUTH_URI: http://keycloak:8080/realms/opendebt/protocol/openid-connect/auth
      TASTSELV_TOKEN_URI: http://keycloak:8080/realms/opendebt/protocol/openid-connect/token
      TASTSELV_USERINFO_URI: http://keycloak:8080/realms/opendebt/protocol/openid-connect/userinfo
      TASTSELV_JWK_URI: http://keycloak:8080/realms/opendebt/protocol/openid-connect/certs
      TASTSELV_CLIENT_SECRET: demo-secret
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      keycloak:
        condition: service_healthy

volumes:
  postgres_data:
  immudb_data:

networks:
  default:
    name: opendebt-network
