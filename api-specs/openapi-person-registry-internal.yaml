openapi: 3.1.0
info:
  title: OpenDebt - Person Registry Internal API
  description: |
    Internal API contract for organization identity lookup needed by creditor-service.

    W1-SPEC-02 boundary decision:
    - `person-registry` remains the owner of organization identity data.
    - `creditor-service` consumes organization identity via technical UUIDs and does not duplicate PII-like organization fields.
  version: 1.0.0
  contact:
    name: OpenDebt Team
    email: opendebt@ufst.dk

servers:
  - url: http://opendebt-person-registry:8090
    description: Internal cluster service

security:
  - bearerAuth: []

tags:
  - name: Organizations
    description: Organization identity operations for internal services

paths:
  /api/v1/organizations/lookup:
    post:
      tags: [Organizations]
      summary: Lookup or create organization by CVR
      operationId: lookupOrCreateOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationLookupRequest'
      responses:
        '200':
          description: Organization resolved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationLookupResponse'

  /api/v1/organizations/{organizationId}:
    get:
      tags: [Organizations]
      summary: Get organization details by technical identifier
      operationId: getOrganization
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Organization details returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/organizations/{organizationId}/exists:
    get:
      tags: [Organizations]
      summary: Check whether an organization exists
      operationId: organizationExists
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Existence result
          content:
            application/json:
              schema:
                type: boolean

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Internal service-to-service token

  schemas:
    OrganizationLookupRequest:
      type: object
      required:
        - cvr
      properties:
        cvr:
          type: string
          pattern: '^[0-9]{8}$'
        name:
          type: string
        address:
          type: string
        organizationType:
          $ref: '#/components/schemas/OrganizationType'

    OrganizationLookupResponse:
      type: object
      required:
        - organizationId
      properties:
        organizationId:
          type: string
          format: uuid

    Organization:
      type: object
      required:
        - organizationId
        - cvr
      properties:
        organizationId:
          type: string
          format: uuid
        cvr:
          type: string
          pattern: '^[0-9]{8}$'
        name:
          type: string
        address:
          type: string
        organizationType:
          $ref: '#/components/schemas/OrganizationType'
        active:
          type: boolean

    OrganizationType:
      type: string
      enum:
        - MUNICIPALITY
        - REGION
        - STATE_AGENCY
        - PUBLIC_INSTITUTION
        - OTHER

    Error:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        errorCode:
          type: string
        message:
          type: string
        traceId:
          type: string

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
