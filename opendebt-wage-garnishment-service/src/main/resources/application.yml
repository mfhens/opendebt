spring:
  application:
    name: opendebt-wage-garnishment-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/opendebt_wage_garnishment}
    username: ${DATABASE_USERNAME:opendebt}
    password: ${DATABASE_PASSWORD:opendebt}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/opendebt}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8080/realms/opendebt/protocol/openid-connect/certs}

server:
  port: 8088
  servlet:
    context-path: /wage-garnishment-service

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    dk.ufst.opendebt: INFO

opendebt:
  wage-garnishment:
    protected-income-threshold: 6500
    max-garnishment-percentage: 50
    employer-notification:
      days-before-start: 14
    eindkomst-integration:
      enabled: true
      endpoint: ${EINDKOMST_ENDPOINT}
    a-melding-integration:
      enabled: true
      endpoint: ${AMELDING_ENDPOINT}
  services:
    debt-service:
      url: ${DEBT_SERVICE_URL:http://localhost:8082}
    case-service:
      url: ${CASE_SERVICE_URL:http://localhost:8081}
    payment-service:
      url: ${PAYMENT_SERVICE_URL:http://localhost:8083}
    letter-service:
      url: ${LETTER_SERVICE_URL:http://localhost:8084}
