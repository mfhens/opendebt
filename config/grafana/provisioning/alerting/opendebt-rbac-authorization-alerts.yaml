apiVersion: 1

groups:
  - orgId: 1
    name: opendebt-rbac-authorization
    folder: OpenDebt
    interval: 1m
    rules:
      - uid: opendebt-rbac-denial-rate
        title: HighAuthorizationDenialRate
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              exemplar: false
              expr: sum(rate(authorization_denied_total[5m]))
              instant: false
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.1
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: High authorization denial rate detected
          description: RBAC authorization denials exceeded 0.1 denials/sec during the last 5 minutes.
        labels:
          severity: warning
          service: opendebt
          signal: authorization
      - uid: opendebt-person-registry-circuit-breaker
        title: PersonRegistryCircuitBreakerOpen
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 60
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              exemplar: false
              expr: max(resilience4j_circuitbreaker_state{name="person-registry",state="open"})
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.5
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 1m
        annotations:
          summary: Person Registry circuit breaker is OPEN
          description: One or more person-registry client circuit breakers are open.
        labels:
          severity: critical
          service: opendebt
          signal: resilience