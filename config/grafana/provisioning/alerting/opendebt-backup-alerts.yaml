apiVersion: 1

groups:
  - orgId: 1
    name: opendebt-backup
    folder: OpenDebt
    interval: 1m
    rules:
      - uid: opendebt-backup-stale
        title: PostgreSQLBackupStale
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              exemplar: false
              expr: time() - pgbackrest_backup_timestamp_last_backup
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 86400
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 1h
        annotations:
          summary: PostgreSQL backup is stale
          description: >
            The most recent pgBackRest backup is more than 24 hours old.
            DR capability is degraded — RPO target may not be met.
            Check pgBackRest logs and storage connectivity.
          runbook_url: https://github.com/ufst/opendebt/blob/main/docs/dr-runbook.md
        labels:
          severity: critical
          service: opendebt
          signal: backup

      - uid: opendebt-wal-archiving-lag
        title: WALArchivingLagging
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              exemplar: false
              expr: pgbackrest_wal_archive_diff_seconds
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 900
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 15m
        annotations:
          summary: PostgreSQL WAL archiving is lagging
          description: >
            WAL archiving is more than 15 minutes behind.
            Effective RPO is degraded beyond the 15-minute warning threshold.
            Check pgBackRest archive-push logs and storage connectivity.
          runbook_url: https://github.com/ufst/opendebt/blob/main/docs/dr-runbook.md
        labels:
          severity: warning
          service: opendebt
          signal: backup

      - uid: opendebt-keyvault-unreachable
        title: EncryptionKeyVaultUnreachable
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 60
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              exemplar: false
              expr: up{job="keyvault-probe"}
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.5
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 5m
        annotations:
          summary: Encryption key vault is unreachable
          description: >
            The Azure Key Vault holding ENCRYPTION_KEY for person-registry is unreachable.
            Do NOT restart person-registry pods — the key is cached in JVM memory.
            If person-registry restarts before the vault recovers, PII decryption will fail.
            Escalate immediately to platform and security teams.
          runbook_url: https://github.com/ufst/opendebt/blob/main/docs/dr-runbook.md#6-encryption-key-vault-emergency
        labels:
          severity: critical
          service: opendebt
          signal: security

      - uid: opendebt-backup-job-failed
        title: PostgreSQLBackupJobFailed
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 3600
              to: 0
            model:
              datasource:
                type: prometheus
                uid: prometheus
              editorMode: code
              exemplar: false
              expr: kube_job_status_failed{namespace="opendebt-production",job_name=~"opendebt-pgbackrest.*"}
              instant: true
              intervalMs: 1000
              legendFormat: __auto
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 0s
        annotations:
          summary: pgBackRest backup Kubernetes job failed
          description: >
            A pgBackRest scheduled backup CronJob has failed in the opendebt-production namespace.
            Check pod logs: kubectl -n opendebt-production logs -l app=pgbackrest-backup
          runbook_url: https://github.com/ufst/opendebt/blob/main/docs/dr-runbook.md
        labels:
          severity: critical
          service: opendebt
          signal: backup
