server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: network
            values: [opendebt-network]

    relabel_configs:
      # Strip the leading "/" from container names (e.g. /case-service → case-service)
      - source_labels: [__meta_docker_container_name]
        regex: /(.+)
        target_label: service
      # Add static environment label
      - target_label: environment
        replacement: local

    pipeline_stages:
      # Parse structured JSON produced by logstash-logback-encoder
      - json:
          expressions:
            level: level
            ts: '"@timestamp"'
      # Promote log level as a stream label (low cardinality, safe)
      - labels:
          level:
      # Use the application's own timestamp instead of ingestion time
      - timestamp:
          source: ts
          format: RFC3339Nano
          action_on_failure: skip
