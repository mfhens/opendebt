        client_ip,
        client_application,
        transaction_id,
        timestamp
      FROM audit_log 
      WHERE id > :cursor.id
      ORDER BY id ASC
      LIMIT 1000
    cursor:
      id:
        initial_value: 0
    period: 10s
    tags: ["audit", "payment-service"]
    fields:
      service: payment-service
      environment: ${ENVIRONMENT:dev}

  # ============================================================================
  # Person Registry Audit Logs (GDPR-sensitive - extra care)
  # ============================================================================
  - type: sql
    id: person-registry-audit
    driver: postgres
    dsn: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/opendebt_person?sslmode=disable"
    sql: |
      SELECT 
        id,
        table_name,
        record_id,
        operation,
        -- Note: old_values and new_values may contain PII
        -- They are already encrypted at rest in Person Registry
        -- CLS should NOT index these fields in plain text
        old_values,
        new_values,
        changed_fields,
        db_user,
        application_user,
        client_ip,
        client_application,
        transaction_id,
        timestamp
      FROM audit_log 
      WHERE id > :cursor.id
      ORDER BY id ASC
      LIMIT 1000
    cursor:
      id:
        initial_value: 0
    period: 10s
    tags: ["audit", "person-registry", "gdpr"]
    fields:
      service: person-registry
      environment: ${ENVIRONMENT:dev}
      gdpr_sensitive: true

  # ============================================================================
  # Letter Service Audit Logs
