# Filebeat configuration for OpenDebt audit log shipping to CLS (ELK stack)
# 
# This configuration polls the audit_log tables in each service's PostgreSQL
# database and ships events to the CLS Elasticsearch cluster.
#
# Deploy as a sidecar or standalone container with access to PostgreSQL.

filebeat.inputs:

  # ============================================================================
  # Creditor Service Audit Logs
  # ============================================================================
  - type: sql
    id: creditor-service-audit
    driver: postgres
    dsn: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/opendebt_creditor?sslmode=disable"
    sql: |
      SELECT 
        id,
        table_name,
        record_id,
        operation,
        old_values,
        new_values,
        changed_fields,
        db_user,
        application_user,
        client_ip,
        client_application,
        transaction_id,
        timestamp
      FROM audit_log 
      WHERE id > :cursor.id
      ORDER BY id ASC
      LIMIT 1000
    cursor:
      id:
        initial_value: 0
    period: 10s
    tags: ["audit", "creditor-service"]
    fields:
      service: creditor-service
      environment: ${ENVIRONMENT:dev}

  # ============================================================================
  # Debt Service Audit Logs
  # ============================================================================
  - type: sql
    id: debt-service-audit
    driver: postgres
    dsn: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/opendebt_debt?sslmode=disable"
    sql: |
      SELECT 
        id,
        table_name,
        record_id,
        operation,
        old_values,
