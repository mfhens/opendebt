    id: payment-service-audit
    driver: postgres
    dsn: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/opendebt_payment?sslmode=disable"
    sql: |
      SELECT 
        id,
        table_name,
        record_id,
        operation,
        old_values,
        new_values,
