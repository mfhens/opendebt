        changed_fields,
        db_user,
        application_user,
        client_ip,
        client_application,
        transaction_id,
        timestamp
      FROM audit_log 
      WHERE id > :cursor.id
      ORDER BY id ASC
      LIMIT 1000
    cursor:
      id:
        initial_value: 0
    period: 10s
    tags: ["audit", "debt-service"]
    fields:
