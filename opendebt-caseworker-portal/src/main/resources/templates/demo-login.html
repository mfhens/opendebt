<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}"
      th:lang="${#locale.language}" lang="da">
<head>
  <title th:text="#{demo.login.page.title}">Demo-login</title>
</head>
<body>
  <span layout:fragment="breadcrumb" th:text="#{demo.login.breadcrumb}">Demo-login</span>
  <section layout:fragment="content">
    <h1 th:text="#{demo.login.title}">V&#230;lg sagsbehandler</h1>
    <p th:text="#{demo.login.description}">
      V&#230;lg den sagsbehandler, du vil logge ind som i demo-tilstand.
    </p>

    <form method="post" th:action="@{/demo-login}" class="skat-card" style="max-width: 40rem;">
      <div class="skat-card__body">
        <div class="skat-form-group">
          <label class="skat-label" for="caseworkerId" th:text="#{demo.login.label}">Sagsbehandler</label>
          <select id="caseworkerId" name="caseworkerId" class="skat-input" required>
            <option value="" disabled selected th:text="#{demo.login.placeholder}">-- V&#230;lg --</option>
            <option th:each="cw : ${caseworkers}"
                    th:value="${cw.id}"
                    th:text="${cw.name + ' — ' + cw.description}">
              Caseworker Name
            </option>
          </select>
        </div>
        <button type="submit" class="skat-btn skat-btn--primary" style="margin-top: 1rem;">
          <span class="ikon ikon-log-ind" aria-hidden="true"></span>
          <span th:text="#{demo.login.button}">Log ind</span>
        </button>
      </div>
    </form>
  </section>
</body>
</html>
