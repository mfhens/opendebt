spring:
  application:
    name: opendebt-caseworker-portal

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
    mode: HTML

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/opendebt}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8080/realms/opendebt/protocol/openid-connect/certs}
      client:
        registration:
          keycloak:
            client-id: opendebt-caseworker-portal
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            scope: openid,profile,email
            authorization-grant-type: authorization_code
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/opendebt}

server:
  port: 8087
  servlet:
    context-path: /caseworker-portal

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    dk.ufst.opendebt: INFO

opendebt:
  i18n:
    default-locale: da-DK
    supported-locales:
      - da-DK
      - en-GB
  services:
    case-service:
      url: ${CASE_SERVICE_URL:http://localhost:8081}
    debt-service:
      url: ${DEBT_SERVICE_URL:http://localhost:8082}
    payment-service:
      url: ${PAYMENT_SERVICE_URL:http://localhost:8083}
    person-registry:
      url: ${PERSON_REGISTRY_URL:http://localhost:8090}
  timeline:
    visibility:
      role-categories:
        CASEWORKER: CASE,DEBT_LIFECYCLE,FINANCIAL,COLLECTION,CORRESPONDENCE,OBJECTION,JOURNAL
        SUPERVISOR: CASE,DEBT_LIFECYCLE,FINANCIAL,COLLECTION,CORRESPONDENCE,OBJECTION,JOURNAL
        ADMIN: CASE,DEBT_LIFECYCLE,FINANCIAL,COLLECTION,CORRESPONDENCE,OBJECTION,JOURNAL

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        ignoreExceptions:
          - dk.ufst.opendebt.common.exception.OpenDebtException
          - org.springframework.web.client.HttpClientErrorException
          - org.springframework.web.reactive.function.client.WebClientResponseException
    instances:
      case-service:
        baseConfig: default
      debt-service-read:
        baseConfig: default
      payment-service:
        baseConfig: default
      person-registry:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        ignoreExceptions:
          - dk.ufst.opendebt.common.exception.OpenDebtException
          - org.springframework.web.client.HttpClientErrorException
          - org.springframework.web.reactive.function.client.WebClientResponseException
    instances:
      case-service:
        baseConfig: default
      debt-service-read:
        baseConfig: default
      payment-service:
        baseConfig: default
      person-registry:
        baseConfig: default
