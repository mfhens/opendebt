# OpenDebt Factory project configuration
# Monorepo: Maven parent with multiple Spring Boot services.

language: java
runtime: java 21

# Source and tests live under each Maven module, e.g. opendebt-*/src/main/java and src/test/java.
source_dir: .
test_dir: .

test:
  framework: junit
  runner: "mvn -q test"
  discovery: "mvn -q -DskipTests test-compile"
  compile_check: "mvn -q -DskipTests test-compile"
  coverage: "mvn -q verify"

bdd:
  framework: cucumber-jvm
  runner: "mvn test -Dcucumber.filter.tags=@acceptance"
  dry_run: "mvn test -Dcucumber.execution.dry-run=true"
  features_dir: src/test/resources/features
  steps_dir: src/test/java

lint:
  runner: "mvn -q spotless:check"
  fix: "mvn -q spotless:apply"

format:
  runner: "mvn -q spotless:apply"

build:
  runner: "mvn -q -DskipTests package"

package_manager: maven
install: "mvn -q -DskipTests test-compile"

# E2E acceptance tests — standalone Node.js project, runs against a live docker-compose stack.
# Not part of the Maven build. Uses the playwright-test-generator agent.
e2e:
  framework: playwright
  project_root: opendebt-e2e
  test_dir: tests
  playwright_config: playwright.config.ts
  ts_config: tsconfig.json
  install_command: "npm ci"
  type_check_command: "npx tsc --noEmit"
  test_list_command: "npx playwright test --list"
  runner: "npx playwright test"
  report_dir: playwright-report
  base_urls:
    creditor_portal: "http://localhost:8085"
    caseworker_portal: "http://localhost:8087"
    citizen_portal: "http://localhost:8086"
