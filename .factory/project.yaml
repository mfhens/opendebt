# OpenDebt Factory project configuration

project:
  name: OpenDebt
  language: java
  runtime: java 21
  source_directories:
    - .
  test_directories:
    - .
  build:
    compile: mvn -q -DskipTests test-compile
    test: mvn -q test
    lint: mvn -q spotless:check
  test_framework: junit
  package_manager: maven
  install: mvn -q -DskipTests test-compile
  bdd:
    framework: cucumber-jvm
    runner: mvn test -Dcucumber.filter.tags=@acceptance
    dry_run: mvn test -Dcucumber.execution.dry-run=true
    features_dir: src/test/resources/features
    step_definitions: src/test/java
  e2e:
    framework: playwright
    project_root: opendebt-e2e
    test_dir: tests
    config: opendebt-e2e/playwright.config.ts
    playwright_config: opendebt-e2e/playwright.config.ts
    ts_config: opendebt-e2e/tsconfig.json
    install_command: npm ci
    type_check_command: npm run typecheck
    test_list_command: npx playwright test --list
    runner: npx playwright test
    report_dir: playwright-report
    base_urls:
      creditor_portal: http://localhost:8085
      caseworker_portal: http://localhost:8087
      citizen_portal: http://localhost:8086
  docs:
    engine: mkdocs-material
    config: mkdocs.yml
    docs_dir: docs/site
    site_dir: site
    build_command: mkdocs build --strict
    serve_command: mkdocs serve
    plugins:
      - search
    site_language: da

stack:
  languages:
    - java
    - typescript
  runtimes:
    - java 21
    - node 22
  frameworks:
    backend:
      - Spring Boot 3.5
      - Flowable 7.0.1
      - Drools 9.x
    ui:
      - Thymeleaf
      - HTMX
    data:
      - PostgreSQL 16
      - Flyway
      - immudb
    integration:
      - OpenAPI 3.1
      - Keycloak 24
      - Smooks 2.0.0
      - OpenTelemetry
      - Resilience4j 2.4.0
    testing:
      - JUnit 5
      - Cucumber 7.18
      - Testcontainers
      - Playwright 1.x
      - SonarCloud
      - OWASP Dependency Check
  rendering:
    mode: server-rendered
    dynamic_interaction: HTMX
