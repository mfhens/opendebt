# OpenDebt — Gas City configuration
#
# Multi-agent orchestration for the OpenDebt petition-driven SDLC pipeline.
# Agents translate petitions → gherkin → specs → TDD implementation → review → merge.
# Two mandatory human gates ensure regulated-domain compliance before code is written
# and before code is merged.
#
# Quick start:
#   gc rig add rules-engine ~/GitHub/opendebt/opendebt-rules-engine
#   gc start ~/GitHub/opendebt
#
# Submit a petition for processing:
#   bd create --title "P055 Forældelse rules" \
#     --label petition --label ready \
#     --set-metadata service=rules-engine \
#     --set-metadata petition_path=petitions/petition055/petition055.md \
#     --set-metadata catala_tier=A
#
# Human gate items:
#   bd list --assignee human

[workspace]
name = "opendebt"
provider = "claude"
includes = ["packs/opendebt"]

[daemon]
patrol_interval = "30s"
max_restarts = 5
restart_window = "1h"
shutdown_timeout = "10s"

# ── Rigs ──────────────────────────────────────────────────────────────────────
# Pilot rig: rules-engine. After updating the path, run:
#   gc rig add rules-engine /path/to/opendebt-rules-engine

# ── Backend service rigs ──────────────────────────────────────────────────────
# Each rig gets its own tdd-enforcer pool. Add/remove as services come online.

[[rigs]]
name = "rules-engine"
path = "/home/markus/GitHub/opendebt/opendebt-rules-engine"
includes = ["packs/opendebt"]

[[rigs]]
name = "debt-service"
path = "/home/markus/GitHub/opendebt/opendebt-debt-service"
includes = ["packs/opendebt"]

[[rigs]]
name = "payment-service"
path = "/home/markus/GitHub/opendebt/opendebt-payment-service"
includes = ["packs/opendebt"]

[[rigs]]
name = "creditor-service"
path = "/home/markus/GitHub/opendebt/opendebt-creditor-service"
includes = ["packs/opendebt"]

[[rigs]]
name = "case-service"
path = "/home/markus/GitHub/opendebt/opendebt-case-service"
includes = ["packs/opendebt"]

[[rigs]]
name = "integration-gateway"
path = "/home/markus/GitHub/opendebt/opendebt-integration-gateway"
includes = ["packs/opendebt"]

[[rigs]]
name = "person-registry"
path = "/home/markus/GitHub/opendebt/opendebt-person-registry"
